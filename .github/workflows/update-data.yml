name: Update Piscine Data
# ───────────────────────────────────────────────────────────────────────────
# このワークフローの役割:
#   42 API から Piscine 生のデータを取得して Cloudflare KV にアップロードする。
#
# 手動実行: GitHub → Actions タブ → "Update Piscine Data" → "Run workflow"
#   month を指定可能: "02"（2月） or "03"（3月）
#
# 自動実行: 3月Piscine進行中は1時間ごとに自動実行（UTC 0-15時 = JST 9-24時）
#
# 必要な GitHub Secrets:
#   CLIENT_ID      → 42 Intra OAuth App UID
#   CLIENT_SECRET  → 42 Intra OAuth App Secret
#   WORKER_SECRET  → Cloudflare Worker へのアップロード認証キー
# ───────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      month:
        description: 'Piscine月 ("02" or "03")'
        required: false
        default: '03'
  schedule:
    # 3月Piscine進行中（2026-03-11〜2026-04-05）は1時間ごと自動実行
    # JST 9:00〜24:00 = UTC 0:00〜15:00
    - cron: '0 0-15 * * *'

permissions:
  contents: read

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest

    steps:
      # ─── Step 1: リポジトリをチェックアウト ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Step 2: Python セットアップ ─────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─── Step 3: 依存ライブラリのインストール ────────────────────────
      - name: Install dependencies
        run: pip install requests

      # ─── Step 4: データ取得 → Cloudflare KV にアップロード ───────────
      - name: Fetch piscine data and upload to KV
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          PISCINE_MONTH: ${{ github.event.inputs.month || '03' }}
        run: python scripts/fetch_data.py

      # ─── Step 5: 座席隣接分析 → KV にアップロード（エラーでも続行）──
      - name: Fetch seat neighbor analysis and upload to KV
        continue-on-error: true
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
          PISCINE_MONTH: ${{ github.event.inputs.month || '03' }}
        run: python scripts/fetch_neighbors.py
