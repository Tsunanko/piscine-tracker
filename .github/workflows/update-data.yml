name: Update Piscine Data
# ───────────────────────────────────────────────────────────────────────────
# このワークフローの役割:
#   42 API から Piscine 生のデータを取得して Cloudflare KV にアップロードする。
#
# 【注意】Piscine 終了のため schedule は無効化済み。
#   必要な場合は GitHub → Actions タブ → "Run workflow" で手動実行。
#
# 手動実行: GitHub → Actions タブ → "Update Piscine Data" → "Run workflow"
#
# 必要な GitHub Secrets:
#   CLIENT_ID      → 42 Intra OAuth App UID
#   CLIENT_SECRET  → 42 Intra OAuth App Secret
#   WORKER_SECRET  → Cloudflare Worker へのアップロード認証キー
# ───────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:  # 手動実行のみ（Piscine 終了のため schedule は停止）

permissions:
  contents: read

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest

    steps:
      # ─── Step 1: リポジトリをチェックアウト ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Step 2: Python セットアップ ─────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─── Step 3: 依存ライブラリのインストール ────────────────────────
      - name: Install dependencies
        run: pip install requests

      # ─── Step 4: データ取得 → Cloudflare KV にアップロード ───────────
      # WORKER_SECRET: fetch_data.py が Worker API /api/kv/upload に認証するためのキー
      # → GitHub Secrets に登録が必要（Settings → Secrets → WORKER_SECRET）
      - name: Fetch piscine data and upload to KV
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}          # 42 Intra OAuth App UID
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}  # 42 Intra OAuth App Secret
          WORKER_SECRET: ${{ secrets.WORKER_SECRET }}  # Cloudflare Worker アップロード認証キー
        run: python scripts/fetch_data.py
