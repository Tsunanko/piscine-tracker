name: Deploy Static Pages
# ───────────────────────────────────────────────────────────────────────────
# このワークフローの役割:
#   main ブランチへの push 時に以下を自動デプロイ:
#   1. GitHub Pages (HTML/JS/CSS) - public/ ディレクトリ
#   2. Cloudflare Worker (workers/index.js) - workers/ ディレクトリ
#
# 【重要】データと分離した理由:
#   - main ブランチ: コード（HTML/JS/Python）のみ。データ(*.json)は含まない
#   - gh-pages ブランチ: update-data.yml が書き込むデータ(*.json)が存在する
#
#   もしデータ復元ステップがないと:
#     git push（コード変更）→ main のコードのみが gh-pages に上書き
#     → gh-pages の data.json が消える → サイトにデータが表示されない！
#
#   そのため "Restore latest data from gh-pages" で gh-pages から最新の
#   data.json と data/*.json を復元してからデプロイする。
# ───────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]  # main ブランチへの push のみトリガー
  workflow_dispatch:   # 手動実行も可能に

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ─── Step 1: リポジトリをチェックアウト ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Step 2: Cloudflare Worker をデプロイ ────────────────────────
      # workers/index.js の変更を Cloudflare Worker に反映する
      # 必要 Secret: CLOUDFLARE_API_TOKEN（Cloudflare Dashboard で発行）
      - name: Deploy Cloudflare Worker
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers

      # ─── Step 3: GitHub Pages へデプロイ ─────────────────────────────
      # コード（HTML/JS/CSS）+ 復元したデータ（JSON）を合わせて gh-pages にデプロイ
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: false
