name: Update Piscine Results
# ───────────────────────────────────────────────────────────────────────────
# このワークフローの役割:
#   Piscine終了後〜1ヶ月間、1日1回 42 API で合否確認を行い、
#   data/results.json を更新して main ブランチにコミットバックする。
#
# 実行タイミング:
#   毎日 JST 10:00 (UTC 01:00) に1回実行
#   Piscine終了日から35日以内のみ実際に処理する（スクリプト内チェック）
#
# 手動実行: GitHub → Actions タブ → "Update Piscine Results" → "Run workflow"
# ───────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 毎日 UTC 01:00 = JST 10:00 に実行
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手動実行を許可

permissions:
  contents: write  # main ブランチへの commit/push に必要

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      # ─── Step 1: main ブランチをチェックアウト ────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # data/results.json が存在する main ブランチ

      # ─── Step 2: Python セットアップ ─────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─── Step 3: 依存ライブラリのインストール ────────────────────────
      - name: Install dependencies
        run: pip install requests

      # ─── Step 4: 合否確認スクリプト実行 ──────────────────────────────
      # exit code 0 → 変更あり（新たに合格者を確認）
      # exit code 2 → 変更なし（スキップ）
      - name: Fetch piscine results
        id: fetch
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          python scripts/fetch_results.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true  # exit code 2 でもワークフローを失敗扱いにしない

      # ─── Step 5: 変更があれば commit & push ──────────────────────────
      # fetch_results.py が変更を検出した場合（exit code 0）のみコミット
      - name: Commit and push results
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update piscine results [skip ci]"
          git push origin main
