name: Check User Data
on:
  workflow_dispatch:
    inputs:
      login:
        description: '42 login name'
        required: true
        default: 'hirosuzu'
      script:
        description: 'Script (piscine / eval_points / eval_sales)'
        required: false
        default: 'piscine'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run check script
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          if [ "${{ github.event.inputs.script }}" = "eval_points" ]; then
            python scripts/check_eval_points.py ${{ github.event.inputs.login }}
          elif [ "${{ github.event.inputs.script }}" = "eval_sales" ]; then
            python scripts/analyze_eval_sales.py
          else
            python scripts/check_user_piscine.py ${{ github.event.inputs.login }}
          fi
