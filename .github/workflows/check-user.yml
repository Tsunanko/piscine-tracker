name: Check User Piscine Dates
on:
  workflow_dispatch:
    inputs:
      login:
        description: '42 login name'
        required: true
        default: 'hirosuzu'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Check user piscine dates
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: python scripts/check_user_piscine.py ${{ github.event.inputs.login }}
