<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統計分析 - Piscine Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #22222e;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00cec9;
    --green-dim: #00b8941a;
    --red: #ff7675;
    --red-dim: #ff76751a;
    --orange: #fdcb6e;
    --gradient: linear-gradient(135deg, #6c5ce7, #00cec9);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 16px;
  }

  /* ── ヘッダー ── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .back-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: color 0.15s, border-color 0.15s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--accent); }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-sub {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ── タブ ── */
  .tab-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  /* ── フィルターバー（全員 / アクティブ切り替え） ── */
  .filter-bar {
    margin-bottom: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .filter-btn {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* ── 検索バー ── */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .search-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    padding: 8px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }
  .search-clear {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
    transition: color 0.15s;
    display: none;
  }
  .search-clear:hover { color: var(--red); }
  .search-result {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 100px;
  }
  .search-result.found { color: var(--red); font-weight: 600; }

  /* ── 相関カード ── */
  .corr-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .corr-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .corr-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .r-badge {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .r-value {
    font-size: 24px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .r-interp {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
  }

  /* ── 平均線の凡例 ── */
  .mean-legend {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }
  .mean-legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .mean-line-sample {
    width: 20px;
    height: 2px;
    border-top: 2px dashed;
    flex-shrink: 0;
  }

  .chart-wrap {
    position: relative;
    height: 360px;
  }

  /* ── サマリー行 ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 16px;
  }
  @media (max-width: 500px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .summary-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .summary-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .summary-value {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent-light);
  }
  .summary-value.highlight-x { color: var(--orange); }
  .summary-value.highlight-y { color: var(--green); }

  /* ── 象限分析 ── */
  .quadrant-section {
    margin-top: 18px;
  }
  .quadrant-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .quadrant-axis-label {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 4px;
  }
  .quadrant-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .quadrant-y-label {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 14px;
  }
  .quadrant-cells {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 6px;
  }
  .quadrant-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    transition: border-color 0.15s;
    position: relative;
  }
  .quadrant-cell.me {
    border-width: 2px;
    background: #1e1e2e;
  }
  .qc-header {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 4px;
  }
  .qc-icon { font-size: 14px; }
  .qc-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .qc-count {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    margin-bottom: 3px;
  }
  .qc-sub {
    font-size: 9px;
    color: var(--text-dim);
    line-height: 1.3;
  }
  .qc-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 6px;
    margin-top: 4px;
  }
  .qc-me-tag {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 9px;
    font-weight: 700;
    color: var(--red);
  }
  .qc-passrate {
    font-size: 10px;
    font-weight: 700;
    margin-top: 4px;
  }

  /* ── 全ペアサマリーテーブル ── */
  .all-corr {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }
  .all-corr-title {
    font-weight: 700;
    color: var(--text-dim);
    margin-bottom: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-size: 11px;
  }
  .corr-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .corr-table th {
    text-align: left;
    color: var(--text-dim);
    font-weight: 600;
    font-size: 11px;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }
  .corr-table td {
    padding: 8px 8px;
    border-bottom: 1px solid var(--border);
  }
  .corr-table tr:last-child td { border-bottom: none; }
  .corr-table tr { cursor: pointer; transition: background 0.1s; }
  .corr-table tr:hover td { background: var(--surface2); }

  .loading {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 0;
    font-size: 14px;
  }

  /* pass/fail 凡例 */
  .legend {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
</style>
<script src="auth.js"></script>
</head>
<body>
<script>
  if (!sessionStorage.getItem('piscine_42_token')) {
    window.location.replace('login.html');

<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <a href="dashboard.html" class="back-btn">← Dashboard</a>
    <div class="header-title">📊 統計分析</div>
    <div class="header-sub" id="headerSub">読み込み中...</div>
  </div>

  <!-- タブ -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(0)">時間 × Level</button>
    <button class="tab-btn" onclick="switchTab(1)">レビュー回数 × Level</button>
    <button class="tab-btn" onclick="switchTab(2)">時間 × レビュー回数</button>
    <button class="tab-btn admin-only-tab" id="tabBtn3" onclick="switchTab(3)" style="display:none">試験スコア</button>
    <button class="tab-btn admin-only-tab" id="tabBtn4" onclick="switchTab(4)" style="display:none">合否分析</button>
  </div>

  <!-- フィルターバー -->
  <div class="filter-bar">
    <button id="filterToggle" class="filter-btn active" onclick="toggleFilter()">アクティブのみ</button>
  </div>

  <!-- 検索バー -->
  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput"
      placeholder="ログイン名でハイライト"
      oncompositionstart="isComposing=true"
      oncompositionend="isComposing=false; if(!suppressInput) onSearch(this.value)"
      oninput="if(!isComposing && !suppressInput) onSearch(this.value)" />
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    <div class="search-result" id="searchResult"></div>
  </div>

  <!-- メインチャートカード -->
  <div class="corr-card" id="mainCard">
    <div class="loading">データ読み込み中...</div>
  </div>

  <!-- 全ペア相関サマリー -->
  <div class="all-corr" id="allCorrTable" style="display:none">
    <div class="all-corr-title">相関係数まとめ</div>
    <table class="corr-table">
      <thead>
        <tr>
          <th>指標ペア</th>
          <th>相関係数 r</th>
          <th>強さ</th>
          <th>n</th>
        </tr>
      </thead>
      <tbody id="corrTableBody"></tbody>
    </table>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// データ & 設定
// ─────────────────────────────────────────────
const TABS = [
  { label: '時間 × Level',           xKey: 'total_hours',  yKey: 'level',        xLabel: 'ログイン時間 (h)', yLabel: 'Level' },
  { label: 'レビュー回数 × Level',   xKey: 'review_given', yKey: 'level',        xLabel: 'レビュー回数',     yLabel: 'Level' },
  { label: '時間 × レビュー回数',    xKey: 'total_hours',  yKey: 'review_given', xLabel: 'ログイン時間 (h)', yLabel: 'レビュー回数' },
];

let currentTab = 0;
let allStudents = [];    // 全学生（data.json の全エントリ）
let activeStudents = []; // 偏差値母集団: is_active=true の学生（旧data.jsonでは全学生にフォールバック）
let showAllStudents = false; // false=アクティブのみ（デフォルト）, true=全員表示
let passes = {};
let chartInstance = null;
let hasPassData = false;
let hasReviewData = false;
let hasActiveField = false; // data.json に is_active フィールドがあるか（後方互換チェック）
let searchLogin = '';   // 検索中のログイン名
let isComposing   = false; // IME composition中フラグ（スマホ2重入力防止）
let suppressInput = false; // compositionend直後のinput誤発火を防ぐフラグ
let currentUser   = null;  // ログイン中ユーザー（管理者チェック用）
const ADMIN_LOGIN = 'ijoja';  // 試験スコアタブを閲覧できる管理者ログイン名

// 現在のフィルタ設定に基づく母集団を返す
function currentStudents() {
  return showAllStudents ? allStudents : activeStudents;
}

// フィルタトグル
function toggleFilter() {
  showAllStudents = !showAllStudents;
  const btn = document.getElementById('filterToggle');
  const nAll = allStudents.length;
  const nActive = activeStudents.length;
  if (showAllStudents) {
    btn.textContent = `全員（${nAll}人）`;
    btn.classList.remove('active');
  } else {
    btn.textContent = `アクティブのみ（${nActive}人）`;
    btn.classList.add('active');
  }
  if (currentTab === 3) {
    renderExamTab();
  } else if (currentTab === 4) {
    renderFailAnalysisTab();
  } else {
    render();
    buildAllCorrTable();
  }
}

// ─────────────────────────────────────────────
// 象限ラベル定義（タブ別・グローバル）
// ─────────────────────────────────────────────
const QUAD_INFO = {
  total_hours: {
    level:        { ru: {icon:'🌟',name:'優秀',   sub:'高時間・高Level', color:'#00cec9', badge:'合格有利'},
                    lu: {icon:'⚡',name:'効率型',  sub:'低時間・高Level', color:'#fdcb6e', badge:''},
                    lb: {icon:'💧',name:'苦戦中',  sub:'低時間・低Level', color:'#ff7675', badge:''},
                    rb: {icon:'💪',name:'努力型',  sub:'高時間・低Level', color:'#a29bfe', badge:''} },
    review_given: { ru: {icon:'📚',name:'活発',   sub:'高時間・多レビュー', color:'#00cec9', badge:''},
                    lu: {icon:'⚡',name:'効率型',  sub:'低時間・多レビュー', color:'#fdcb6e', badge:''},
                    lb: {icon:'💧',name:'苦戦中',  sub:'低時間・少レビュー', color:'#ff7675', badge:''},
                    rb: {icon:'📖',name:'黙々型',  sub:'高時間・少レビュー', color:'#a29bfe', badge:''} },
  },
  level: {
    review_given: { ru: {icon:'🌟',name:'優秀',   sub:'高Level・多レビュー', color:'#00cec9', badge:''},
                    lu: {icon:'📚',name:'支援型',  sub:'低Level・多レビュー', color:'#fdcb6e', badge:''},
                    lb: {icon:'💧',name:'苦戦中',  sub:'低Level・少レビュー', color:'#ff7675', badge:''},
                    rb: {icon:'🎯',name:'集中型',  sub:'高Level・少レビュー', color:'#a29bfe', badge:''} },
  },
};
const QUAD_FALLBACK = {
  ru: {icon:'↗',name:'高x高y', sub:'', color:'#00cec9', badge:''},
  lu: {icon:'↖',name:'低x高y', sub:'', color:'#fdcb6e', badge:''},
  lb: {icon:'↙',name:'低x低y', sub:'', color:'#ff7675', badge:''},
  rb: {icon:'↘',name:'高x低y', sub:'', color:'#a29bfe', badge:''},
};

// ─────────────────────────────────────────────
// ユーティリティ
// ─────────────────────────────────────────────
function pearsonR(xs, ys) {
  const n = xs.length;
  if (n < 2) return 0;
  const mx = xs.reduce((a,b)=>a+b,0)/n;
  const my = ys.reduce((a,b)=>a+b,0)/n;
  const num = xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my), 0);
  const den = Math.sqrt(xs.reduce((s,x)=>s+(x-mx)**2,0) * ys.reduce((s,y)=>s+(y-my)**2,0));
  return den === 0 ? 0 : num/den;
}

function linearRegLine(xs, ys) {
  const n = xs.length;
  const mx = xs.reduce((a,b)=>a+b,0)/n;
  const my = ys.reduce((a,b)=>a+b,0)/n;
  const slope = xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0) / xs.reduce((s,x)=>s+(x-mx)**2,0);
  const intercept = my - slope*mx;
  return { slope, intercept };
}

function rColor(r) {
  const abs = Math.abs(r);
  if (abs >= 0.7) return '#00cec9';
  if (abs >= 0.4) return '#fdcb6e';
  return '#8888a0';
}

function rInterp(r) {
  const abs = Math.abs(r);
  const dir = r >= 0 ? '正' : '負';
  if (abs >= 0.7) return { text: `強い${dir}の相関`, bg: '#00cec91a', color: '#00cec9' };
  if (abs >= 0.4) return { text: `中程度の${dir}の相関`, bg: '#fdcb6e1a', color: '#fdcb6e' };
  if (abs >= 0.2) return { text: `弱い${dir}の相関`, bg: '#a29bfe1a', color: '#a29bfe' };
  return { text: 'ほぼ相関なし', bg: '#8888a01a', color: '#8888a0' };
}

function baseColor(login) {
  if (!hasPassData) return 'rgba(108,92,231,0.75)';
  const p = passes[login];
  if (p === 'pass') return 'rgba(0,206,201,0.80)';
  if (p === 'fail') return 'rgba(255,118,117,0.80)';
  return 'rgba(136,136,160,0.55)';
}

function mean(arr) { return arr.reduce((a,b)=>a+b,0)/arr.length; }
function stddev(arr) {
  const m = mean(arr);
  return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/arr.length);
}

// ─────────────────────────────────────────────
// 検索
// ─────────────────────────────────────────────
function onSearch(val) {
  searchLogin = val.trim().toLowerCase();
  document.getElementById('searchClear').style.display = searchLogin ? 'block' : 'none';
  renderChart();   // チャートだけ再描画（HTMLは維持）
  // compositionend直後のinput誤発火を50ms間だけ抑制
  suppressInput = true;
  setTimeout(() => { suppressInput = false; }, 50);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchLogin = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchResult').textContent = '';
  document.getElementById('searchResult').className = 'search-result';
  renderChart();
}

// ─────────────────────────────────────────────
// データ読み込み
// ─────────────────────────────────────────────
async function loadData(currentUser = null) {
  const isAdmin = currentUser && currentUser.login === 'ijoja';
  const token = sessionStorage.getItem('piscine_42_token') || '';
  const res = await fetch('https://piscine-tracker.tsunanko.workers.dev/api/data', {
    headers: token ? { Authorization: `Bearer ${token}` } : {},
  });
  const d = await res.json();
  const all = [...(d.online || []), ...(d.offline || [])];
  const map = {};
  for (const s of all) map[s.login] = s;
  allStudents = Object.values(map);

  hasReviewData = allStudents.some(s => s.review_given != null && s.review_given > 0);

  // is_active フィールドの有無で後方互換性を確保
  // 旧 data.json（is_active なし）→ 全学生を activeStudents として扱う
  // 新 data.json（is_active あり）→ is_active=true の学生のみ
  hasActiveField = allStudents.some(s => 'is_active' in s);
  activeStudents = hasActiveField ? allStudents.filter(s => s.is_active) : allStudents;

  // 合否データを API レスポンスから直接取得（管理者のみ）
  passes = {};
  if (isAdmin) {
    for (const s of allStudents) {
      if (s.piscine_result === 'passed') passes[s.login] = 'pass';
      else if (s.piscine_result === 'failed') passes[s.login] = 'fail';
    }
    hasPassData = Object.keys(passes).length > 0;
  } else {
    hasPassData = false;
  }

  const activeLabel = hasActiveField
    ? `全${allStudents.length}人・アクティブ${activeStudents.length}人（偏差値基準）`
    : `全${allStudents.length}人`;
  document.getElementById('headerSub').textContent =
    activeLabel + (hasPassData ? ' · 合否データあり' : '');

  // フィルタトグルボタンの初期ラベル（人数を反映）
  const filterBtn = document.getElementById('filterToggle');
  if (filterBtn && hasActiveField) {
    filterBtn.textContent = `アクティブのみ（${activeStudents.length}人）`;
  } else if (filterBtn) {
    filterBtn.style.display = 'none'; // is_active フィールドがない旧データは非表示
  }

  buildAllCorrTable();

  // URL パラメータ ?login=XXX があれば自動ハイライト
  const urlLogin = new URLSearchParams(window.location.search).get('login');
  if (urlLogin) {
    searchLogin = urlLogin.toLowerCase();
    const input = document.getElementById('searchInput');
    if (input) {
      input.value = urlLogin;
      document.getElementById('searchClear').style.display = 'block';
    }
  }

  render();
}

// ─────────────────────────────────────────────
// フルレンダリング（HTML + Chart）
// ─────────────────────────────────────────────
function render() {
  document.getElementById('allCorrTable').style.display = 'block';
  const tab = TABS[currentTab];
  const reviewTab = (tab.xKey==='review_given'||tab.yKey==='review_given');

  // 母集団: トグルで「アクティブのみ」「全員」を切り替え可能
  let pts = currentStudents().map(s => ({
    x: s[tab.xKey],
    y: s[tab.yKey],
    login: s.login,
    active_days: s.active_days,
  })).filter(p => p.x != null && p.y != null && !isNaN(p.x) && !isNaN(p.y));

  if (reviewTab && !hasReviewData) {
    document.getElementById('mainCard').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--text-dim)">
        <div style="font-size:32px;margin-bottom:12px">⏳</div>
        <div style="font-size:14px">レビュー回数データはまだ更新中です</div>
        <div style="font-size:12px;margin-top:6px">次のデータ更新後（最大1時間）に表示されます</div>
      </div>`;
    return;
  }

  const xs = pts.map(p=>p.x);
  const ys = pts.map(p=>p.y);
  const r = pearsonR(xs, ys);
  const interp = rInterp(r);
  const reg = linearRegLine(xs, ys);

  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const xMean = mean(xs), xStd = stddev(xs);
  const yMean = mean(ys), yStd = stddev(ys);
  const xPad = (xMax - xMin) * 0.05;
  const yPad = (yMax - yMin) * 0.05;

  // 1日平均ログイン時間（total_hoursタブのみ、active_daysがある場合）
  const isTimeXTab = tab.xKey === 'total_hours';
  const dailyAvgVals = isTimeXTab
    ? pts.map(p => (p.active_days > 0) ? p.x / p.active_days : null).filter(v => v != null)
    : [];
  const dailyAvgMean = dailyAvgVals.length > 0 ? mean(dailyAvgVals) : null;

  // ── 象限分析 ──────────────────────────────────
  // 右上(ru)=高x高y / 左上(lu)=低x高y / 左下(lb)=低x低y / 右下(rb)=高x低y
  const qBuckets = { ru: [], lu: [], lb: [], rb: [] };
  for (const p of pts) {
    const qx = p.x >= xMean ? 'r' : 'l';
    const qy = p.y >= yMean ? 'u' : 'b';
    qBuckets[qx + qy].push(p);
  }
  // 象限ごとの合否率（hasPassData時）
  function qPassRate(bucket) {
    if (!hasPassData) return null;
    const known = bucket.filter(p => passes[p.login] !== undefined);
    if (known.length === 0) return null;
    const passed = known.filter(p => passes[p.login] === 'pass').length;
    return { passed, total: known.length, pct: Math.round(passed / known.length * 100) };
  }
  // ハイライト中の学生がどの象限か
  const matchedInQuad = searchLogin
    ? (allStudents.find(s => s.login.toLowerCase() === searchLogin)?.login || null)
    : null;
  function meQuad(bucket) {
    return matchedInQuad ? bucket.some(p => p.login === matchedInQuad) : false;
  }
  // 各象限の定義（グローバル QUAD_INFO から取得）
  const qi = (QUAD_INFO[tab.xKey] || {})[tab.yKey] || QUAD_FALLBACK;

  function quadCell(key, topRow) {
    const info = qi[key];
    const bucket = qBuckets[key];
    const pr = qPassRate(bucket);
    const isMe = meQuad(bucket);
    const cellStyle = `border-color:${info.color}40${isMe ? ';border-color:'+info.color+';border-width:2px' : ''}`;
    return `<div class="quadrant-cell${isMe ? ' me' : ''}" style="${cellStyle}">
      ${isMe ? `<div class="qc-me-tag">● ${matchedInQuad}</div>` : ''}
      <div class="qc-header">
        <span class="qc-icon">${info.icon}</span>
        <span class="qc-name" style="color:${info.color}">${info.name}</span>
      </div>
      <div class="qc-count">${bucket.length}<span style="font-size:12px;font-weight:400;color:var(--text-dim)">人</span></div>
      <div class="qc-sub">${info.sub}</div>
      ${info.badge ? `<div class="qc-badge" style="background:${info.color}20;color:${info.color}">${info.badge}</div>` : ''}
      ${pr ? `<div class="qc-passrate" style="color:${info.color}">合格率 ${pr.pct}% <span style="font-size:9px;color:var(--text-dim)">(${pr.passed}/${pr.total})</span></div>` : ''}
    </div>`;
  }

  document.getElementById('mainCard').innerHTML = `
    <div class="corr-header">
      <div class="corr-title">${tab.label}</div>
      <div class="r-badge">
        <div>
          <div style="font-size:10px;color:var(--text-dim);margin-bottom:2px">相関係数 r</div>
          <div class="r-value" style="color:${rColor(r)}">${r.toFixed(3)}</div>
        </div>
        <div class="r-interp" style="background:${interp.bg};color:${interp.color}">${interp.text}</div>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="scatterCanvas"></canvas></div>
    <div class="mean-legend">
      <div class="mean-legend-item">
        <div class="mean-line-sample" style="border-color:#fdcb6e"></div>
        <span style="color:#fdcb6e">${tab.xLabel} 平均</span>
        <span style="font-weight:700;color:#fdcb6e;margin-left:2px">${xMean.toFixed(1)}</span>
      </div>
      <div class="mean-legend-item">
        <div class="mean-line-sample" style="border-color:#00cec9"></div>
        <span style="color:#00cec9">${tab.yLabel} 平均</span>
        <span style="font-weight:700;color:#00cec9;margin-left:2px">${yMean.toFixed(2)}</span>
      </div>
      <div class="mean-legend-item" style="margin-left:auto;color:var(--text-dim);font-size:10px">
        --- 回帰直線
      </div>
    </div>
    ${hasActiveField ? `<div style="font-size:10px;color:#555570;margin-top:6px;text-align:right">
      ${showAllStudents
        ? '※ 平均・n は全参加者基準'
        : '※ 平均・n はアクティブ参加者（直近7日1h以上）基準 = 偏差値50の基準'}
    </div>` : ''}
    ${hasPassData ? `
    <div class="legend">
      <span><span class="legend-dot" style="background:#00cec9"></span>合格</span>
      <span><span class="legend-dot" style="background:#ff7675"></span>不合格</span>
      <span><span class="legend-dot" style="background:#8888a0"></span>未確定</span>
    </div>` : ''}
    <div class="summary-grid">
      <div class="summary-item">
        <div class="summary-label">n（${hasActiveField ? '直近7日アクティブ・偏差値基準' : '対象人数'}）</div>
        <div class="summary-value">${pts.length}人</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">${tab.xLabel} 平均</div>
        <div class="summary-value highlight-x">${xMean.toFixed(1)}</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">${tab.yLabel} 平均</div>
        <div class="summary-value highlight-y">${yMean.toFixed(2)}</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">${tab.xLabel} 標準偏差</div>
        <div class="summary-value">${xStd.toFixed(1)}</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">${tab.yLabel} 標準偏差</div>
        <div class="summary-value">${yStd.toFixed(2)}</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">決定係数 r²</div>
        <div class="summary-value">${(r*r).toFixed(3)}</div>
      </div>
      ${dailyAvgMean != null ? `
      <div class="summary-item">
        <div class="summary-label">1日平均 (h) 平均</div>
        <div class="summary-value highlight-x">${dailyAvgMean.toFixed(1)}</div>
      </div>` : ''}
    </div>

    <!-- 象限分析 -->
    <div class="quadrant-section">
      <div class="quadrant-title">象限分析 <span style="font-size:10px;font-weight:400">平均値で4分割</span></div>
      <div class="quadrant-axis-label">${tab.xLabel}：少 ←───────────────────────────→ 多</div>
      <div class="quadrant-row">
        <div class="quadrant-y-label">${tab.yLabel}：多 ← 少</div>
        <div class="quadrant-cells">
          ${quadCell('lu', true)}
          ${quadCell('ru', true)}
          ${quadCell('lb', false)}
          ${quadCell('rb', false)}
        </div>
      </div>
    </div>`;

  // Chart を描画（変数を closure で渡す）
  renderChart({ pts, xs, ys, xMin, xMax, yMin, yMax, xMean, yMean, xPad, yPad, reg, tab, qi, isTimeXTab });
}

// ─────────────────────────────────────────────
// チャートのみ再描画（検索ハイライト用）
// ─────────────────────────────────────────────
function renderChart(cached) {
  // cached がない場合は現在のデータから再構築
  if (!cached) {
    const tab = TABS[currentTab];
    const reviewTab = (tab.xKey==='review_given'||tab.yKey==='review_given');
    if (reviewTab && !hasReviewData) return;
    if (!document.getElementById('scatterCanvas')) return;

    const isTimeXTab = tab.xKey === 'total_hours';
    const pts = currentStudents().map(s => ({
      x: s[tab.xKey], y: s[tab.yKey], login: s.login, active_days: s.active_days,
    })).filter(p => p.x != null && p.y != null && !isNaN(p.x) && !isNaN(p.y));
    const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
    const xMin = Math.min(...xs), xMax = Math.max(...xs);
    const yMin = Math.min(...ys), yMax = Math.max(...ys);
    const xMean = mean(xs), yMean = mean(ys);
    const xPad = (xMax - xMin)*0.05, yPad = (yMax - yMin)*0.05;
    const reg = linearRegLine(xs, ys);
    const qi = (QUAD_INFO[tab.xKey] || {})[tab.yKey] || QUAD_FALLBACK;
    cached = { pts, xs, ys, xMin, xMax, yMin, yMax, xMean, yMean, xPad, yPad, reg, tab, qi, isTimeXTab };
  }

  const { pts, xs, ys, xMin, xMax, yMin, yMax, xMean, yMean, xPad, yPad, reg, tab, qi, isTimeXTab } = cached;

  // 検索マッチ判定
  const hasSearch = searchLogin.length > 0;
  const matchedLogin = hasSearch
    ? (allStudents.find(s => s.login.toLowerCase() === searchLogin)?.login || null)
    : null;

  // 検索結果表示更新
  const resultEl = document.getElementById('searchResult');
  if (hasSearch) {
    if (matchedLogin) {
      const s = allStudents.find(s => s.login === matchedLogin);
      const xVal = s[tab.xKey];
      const yVal = s[tab.yKey];
      const isInChart = pts.some(p => p.login === matchedLogin);
      resultEl.className = 'search-result found';
      const valStr = xVal != null && yVal != null
        ? `${matchedLogin}: ${Number(xVal).toFixed(1)} / ${Number(yVal).toFixed(2)}`
        : `${matchedLogin}: データなし`;
      // アクティブ外の学生は散布図に表示されないため案内を付加
      resultEl.textContent = valStr + (!isInChart && hasActiveField ? '（アクティブ期間外・散布図には非表示）' : '');
    } else {
      resultEl.className = 'search-result';
      resultEl.textContent = '見つかりません';
    }
  } else {
    resultEl.className = 'search-result';
    resultEl.textContent = '';
  }

  // 点の色・サイズを決定
  const colors = pts.map(p => {
    if (matchedLogin && p.login === matchedLogin) return 'rgba(255,118,117,1)';  // 赤ハイライト
    if (hasSearch) return 'rgba(108,92,231,0.18)';  // 他は薄く
    return baseColor(p.login);
  });
  const radii = pts.map(p =>
    (matchedLogin && p.login === matchedLogin) ? 10 : 5
  );
  const borders = pts.map(p =>
    (matchedLogin && p.login === matchedLogin) ? 'rgba(255,255,255,0.9)' : 'transparent'
  );
  const borderWidths = pts.map(p =>
    (matchedLogin && p.login === matchedLogin) ? 2 : 0
  );

  // 平均線の2点ずつ（縦線: x=xMean、横線: y=yMean）
  const meanXLine = [
    { x: xMean, y: yMin - yPad },
    { x: xMean, y: yMax + yPad },
  ];
  const meanYLine = [
    { x: xMin - xPad, y: yMean },
    { x: xMax + xPad, y: yMean },
  ];
  // 回帰直線
  const regPts = [
    { x: xMin - xPad, y: reg.slope*(xMin-xPad) + reg.intercept },
    { x: xMax + xPad, y: reg.slope*(xMax+xPad) + reg.intercept },
  ];

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  const canvas = document.getElementById('scatterCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // Chart.js インラインプラグイン: 象限ラベルをチャート上に描画
  const quadrantLabelPlugin = {
    id: 'quadrantLabels',
    afterDraw(chart) {
      const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
      const xMeanPx = x.getPixelForValue(xMean);
      const yMeanPx = y.getPixelForValue(yMean);
      ctx.save();
      ctx.font = 'bold 11px "Noto Sans JP", system-ui, sans-serif';

      const draw = (info, tx, ty, hAlign, vAlign) => {
        ctx.globalAlpha = 0.38;
        ctx.fillStyle = info.color;
        ctx.textAlign = hAlign;
        ctx.textBaseline = vAlign;
        ctx.fillText(`${info.icon} ${info.name}`, tx, ty);
      };

      const pad = 10;
      draw(qi.ru, right  - pad, top    + pad, 'right',  'top');     // 右上
      draw(qi.lu, left   + pad, top    + pad, 'left',   'top');     // 左上
      draw(qi.lb, left   + pad, bottom - pad, 'left',   'bottom');  // 左下
      draw(qi.rb, right  - pad, bottom - pad, 'right',  'bottom');  // 右下

      ctx.restore();
    }
  };

  chartInstance = new Chart(ctx, {
    type: 'scatter',
    plugins: [quadrantLabelPlugin],
    data: {
      datasets: [
        // ① 学生の点（通常 or ハイライト）
        {
          label: '学生',
          data: pts.map(p=>({ x:p.x, y:p.y, login:p.login })),
          backgroundColor: colors,
          pointRadius: radii,
          pointHoverRadius: radii.map(r=>r+3),
          pointBorderColor: borders,
          pointBorderWidth: borderWidths,
          order: 3,
        },
        // ② X軸平均線（縦）
        {
          label: `${tab.xLabel} 平均: ${xMean.toFixed(1)}`,
          data: meanXLine,
          type: 'line',
          borderColor: 'rgba(253,203,110,0.7)',
          borderWidth: 1.5,
          borderDash: [4, 3],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 2,
        },
        // ③ Y軸平均線（横）
        {
          label: `${tab.yLabel} 平均: ${yMean.toFixed(2)}`,
          data: meanYLine,
          type: 'line',
          borderColor: 'rgba(0,206,201,0.7)',
          borderWidth: 1.5,
          borderDash: [4, 3],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 2,
        },
        // ④ 回帰直線
        {
          label: '回帰直線',
          data: regPts,
          type: 'line',
          borderColor: 'rgba(162,155,254,0.5)',
          borderWidth: 1.5,
          borderDash: [6, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 1,
        },
      ],
    },
    options: {
      animation: { duration: 200 },
      responsive: true,
      maintainAspectRatio: false,
      onClick(event, elements) {
        // 学生の点（dataset index 0）をクリックしたら個人ページへ
        const el = elements.find(e => e.datasetIndex === 0);
        if (el) {
          const login = pts[el.index].login;
          window.location.href = `index.html?login=${encodeURIComponent(login)}`;
        }
      },
      onHover(event, elements) {
        const el = elements.find(e => e.datasetIndex === 0);
        event.native.target.style.cursor = el ? 'pointer' : 'default';
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          filter(item) { return item.datasetIndex === 0; },  // 学生点のみtooltip
          callbacks: {
            label(ctx) {
              const d = ctx.raw;
              if (!d.login) return '';
              const dailyStr = (isTimeXTab && d.active_days > 0)
                ? `  1日平均: ${(d.x / d.active_days).toFixed(1)}h`
                : '';
              return ` ${d.login}  (${tab.xLabel}: ${Number(d.x).toFixed(1)}, ${tab.yLabel}: ${Number(d.y).toFixed(2)})${dailyStr}  ← クリックで詳細`;
            },
          },
          backgroundColor: '#1a1a24',
          borderColor: '#2a2a3a',
          borderWidth: 1,
          titleColor: '#a29bfe',
          bodyColor: '#e8e8f0',
          padding: 10,
        },
      },
      scales: {
        x: {
          title: { display: true, text: tab.xLabel, color: '#8888a0', font: { size: 12 } },
          grid: { color: '#2a2a3a' },
          ticks: { color: '#8888a0' },
          min: Math.max(0, xMin - xPad),
          max: xMax + xPad,
        },
        y: {
          title: { display: true, text: tab.yLabel, color: '#8888a0', font: { size: 12 } },
          grid: { color: '#2a2a3a' },
          ticks: { color: '#8888a0' },
          min: Math.max(0, yMin - yPad),
          max: yMax + yPad,
        },
      },
    },
  });
}

// ─────────────────────────────────────────────
// 試験スコアタブ
// ─────────────────────────────────────────────
function renderExamTab() {
  // 管理者以外はアクセス不可
  if (!currentUser || currentUser.login !== ADMIN_LOGIN) {
    document.getElementById('mainCard').innerHTML =
      `<div class="loading" style="color:var(--red)">⛔ このページは管理者専用です</div>`;
    return;
  }
  document.getElementById('allCorrTable').style.display = 'none';

  // フィルター適用（アクティブのみ or 全員）
  const students  = currentStudents();
  const withScore = students.filter(s => s.exam_score != null);
  const noScore   = students.filter(s => s.exam_score == null);


  // Piscine通過結果ベースの集計（passes[] = loadData で構築済み）
  const piscinePass    = students.filter(s => passes[s.login] === 'pass');
  const piscineFail    = students.filter(s => passes[s.login] === 'fail');
  const piscinePassRate = students.length > 0 ? Math.round(piscinePass.length / students.length * 100) : 0;

  // 未受験なのにPiscine合格した人
  const noScoreButPass = noScore.filter(s => passes[s.login] === 'pass');

  // 平均スコア（2種類）
  // - 受験者平均: 受けた人だけが分母
  // - 母集団平均: フィルター全員が分母（未受験者は0点扱い）
  const avgExaminees  = withScore.length > 0
    ? withScore.reduce((a, s) => a + s.exam_score, 0) / withScore.length
    : null;
  const avgPopulation = students.length > 0
    ? withScore.reduce((a, s) => a + s.exam_score, 0) / students.length
    : null;

  // スコア帯ごとの Piscine合格/不合格/結果未集計 を分けてカウント（最初のビン=未受験）
  const binLabels = ['未受験','0-9','10-19','20-29','30-39','40-49','50-59','60-69','70-79','80-89','90-99','100'];
  const bins = Array(12).fill(null).map(() => ({ pass: 0, fail: 0, unknown: 0 }));
  // 未受験者をビン[0]に追加
  for (const s of noScore) {
    const r = passes[s.login];
    if (r === 'pass')      bins[0].pass++;
    else if (r === 'fail') bins[0].fail++;
    else                   bins[0].unknown++;
  }
  // 受験者をビン[1-11]に追加（スコア÷10 + 1）
  for (const s of withScore) {
    const bi = Math.min(Math.floor(s.exam_score / 10), 10) + 1;
    const r  = passes[s.login];
    if (r === 'pass')      bins[bi].pass++;
    else if (r === 'fail') bins[bi].fail++;
    else                   bins[bi].unknown++;
  }

  // スコア一覧（降順）— Piscine結果で合否表示
  const sorted = [...withScore].sort((a, b) => b.exam_score - a.exam_score);
  const makeResultBadge = r => {
    const isPass = r === 'pass', isFail = r === 'fail';
    const badgeBg    = isPass ? 'var(--green-dim)' : isFail ? 'var(--red-dim)' : '#2a2a3a';
    const badgeColor = isPass ? 'var(--green)'     : isFail ? 'var(--red)'     : 'var(--text-dim)';
    const badgeText  = isPass ? '🎉 合格'          : isFail ? '不合格'         : '—';
    return `<span style="background:${badgeBg};color:${badgeColor};padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600">${badgeText}</span>`;
  };
  const rows = sorted.map((s, i) => {
    const r = passes[s.login];
    const scoreColor = r === 'pass' ? 'var(--green)' : r === 'fail' ? 'var(--red)' : 'var(--text)';
    return `<tr>

  const noScoreRows = noScore.map((s, i) => {

      <td style="color:var(--text-dim)">${sorted.length + i + 1}</td>

  const noScorePassRows = noScoreButPass.map(s =>

      </div>
      <div class="summary-item">
        <div class="summary-label">Piscine不合格</div>
        <div class="summary-value" style="color:var(--red)">${piscineFail.length}人</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">Piscine通過率</div>
        <div class="summary-value">${students.length > 0 ? piscinePassRate + '%' : '—'}</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">Exam受験者</div>
        <div class="summary-value">${withScore.length}人</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">受験者平均スコア</div>
        <div class="summary-value">${avgExaminees != null ? avgExaminees.toFixed(1) : '—'}</div>
      </div>
      <div class="summary-item">
        <div class="summary-label" style="font-size:10px">母集団平均（未受験0点）</div>
        <div class="summary-value">${avgPopulation != null ? avgPopulation.toFixed(1) : '—'}</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">Exam未受験</div>
        <div class="summary-value" style="color:var(--text-dim)">${noScore.length}人</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">未受験で合格</div>
        <div class="summary-value" style="color:var(--orange)">${noScoreButPass.length}人</div>
      </div>
    </div>
    ${noScoreButPass.length > 0 ? `
    <div style="margin-top:10px;padding:8px 12px;background:rgba(253,203,110,0.08);border-radius:8px;border:1px solid rgba(253,203,110,0.2)">
      <span style="font-size:11px;color:var(--orange);font-weight:600">Exam未受験でPiscine合格：</span>

    <div class="mean-legend" style="margin-top:14px">
      <span><span style="background:rgba(0,206,201,0.8);display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle"></span>Piscine合格</span>
      <span><span style="background:rgba(255,118,117,0.8);display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle"></span>Piscine不合格</span>
      <span><span style="background:rgba(136,136,160,0.5);display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle"></span>結果未集計</span>

  if (withScore.length === 0) return;

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const canvas = document.getElementById('examCanvas');
  if (!canvas) return;
  chartInstance = new Chart(canvas.getContext('2d'), {

              if (total === 0) return [];

// ─────────────────────────────────────────────
// 合否分析タブ（管理者専用）
// ─────────────────────────────────────────────
let failSortKey = 'exam'; // 'exam' | 'hours' | 'level' | 'review'

function renderFailAnalysisTab() {
  if (!currentUser || currentUser.login !== ADMIN_LOGIN) {
    document.getElementById('mainCard').innerHTML =
      `<div class="loading" style="color:var(--red)">⛔ このページは管理者専用です</div>`;
    return;
  }
  document.getElementById('allCorrTable').style.display = 'none';

  // currentStudents() でアクティブフィルター反映済み
  const students     = currentStudents();
  const failStudents = students.filter(s => passes[s.login] === 'fail');
  const passStudents = students.filter(s => passes[s.login] === 'pass');

  if (failStudents.length === 0) {
    document.getElementById('mainCard').innerHTML =
      `<div style="text-align:center;padding:40px;color:var(--text-dim)">不合格者データがありません</div>`;
    return;
  }

  // --- ヘルパー ---
  const avg = (arr, key) => {
    const vals = arr.map(s => s[key]).filter(v => v != null && !isNaN(v));
    return vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  };
  const fmt  = (v, d=1) => v != null ? v.toFixed(d) : '—';
  const fmtI = (v)      => v != null ? Math.round(v).toString() : '—';

  // --- 合格者/不合格者の各種平均 ---
  const passAvgScore  = avg(passStudents.filter(s => s.exam_score != null), 'exam_score');
  const failAvgScore  = avg(failStudents.filter(s => s.exam_score != null), 'exam_score');
  const passAvgHours  = avg(passStudents, 'total_hours');
  const failAvgHours  = avg(failStudents, 'total_hours');
  const passAvgLevel  = avg(passStudents, 'level');
  const failAvgLevel  = avg(failStudents, 'level');
  const passAvgReview = avg(passStudents.filter(s => s.review_given != null), 'review_given');
  const failAvgReview = avg(failStudents.filter(s => s.review_given != null), 'review_given');

  // --- 最低ライン分析 ---
  const passWithScore  = passStudents.filter(s => s.exam_score != null);
  const minPassScore   = passWithScore.length > 0 ? Math.min(...passWithScore.map(s => s.exam_score)) : null;

  const passWithHours  = passStudents.filter(s => s.total_hours != null);
  const minPassHours   = passWithHours.length > 0 ? Math.min(...passWithHours.map(s => s.total_hours)) : null;

  const passWithLevel  = passStudents.filter(s => s.level != null);
  const minPassLevel   = passWithLevel.length > 0 ? Math.min(...passWithLevel.map(s => s.level)) : null;

  // --- 不合格者スコア分布 ---
  const failWithScore = failStudents.filter(s => s.exam_score != null);
  const failNoScore   = failStudents.filter(s => s.exam_score == null);

  // 高スコア不合格者（しきい値=合格者最低点の50%、最低24点）
  const threshold    = Math.max(24, minPassScore != null ? Math.floor(minPassScore * 0.5) : 24);
  const highScoreFail = failWithScore.filter(s => s.exam_score >= threshold);

  // --- 一覧のソート ---
  const sortedFail = [...failWithScore].sort((a, b) => {
    if (failSortKey === 'exam')   return (b.exam_score ?? -1)   - (a.exam_score ?? -1);
    if (failSortKey === 'hours')  return (b.total_hours ?? -1)  - (a.total_hours ?? -1);
    if (failSortKey === 'level')  return (b.level ?? -1)        - (a.level ?? -1);
    if (failSortKey === 'review') return (b.review_given ?? -1) - (a.review_given ?? -1);
    return 0;
  });

  const sortBtn = (key, label) => {
    const active = failSortKey === key;
    return `<span onclick="failSortKey='${key}';renderFailAnalysisTab()"
      style="cursor:pointer;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:4px;
      background:${active ? 'var(--accent)' : 'rgba(255,255,255,0.06)'};
      color:${active ? '#fff' : 'var(--text-dim)'}">${label}</span>`;
  };

  // --- 条件クリア判定ヘルパー ---
  const condCheck = (s) => ({
    exam:  minPassScore != null && s.exam_score  != null && s.exam_score  >= minPassScore,
    hours: minPassHours != null && s.total_hours != null && s.total_hours >= minPassHours,
    level: minPassLevel != null && s.level       != null && s.level       >= minPassLevel,
  });
  const condCount = (s) => {
    const c = condCheck(s);
    return (c.exam ? 1 : 0) + (c.hours ? 1 : 0) + (c.level ? 1 : 0);
  };
  const ck = (ok) => ok
    ? `<span style="color:var(--green);font-weight:700">✓</span>`
    : `<span style="color:var(--red);opacity:0.5">✗</span>`;

  // --- 標準偏差ヘルパー ---
  const stdDev = (arr, key) => {
    const vals = arr.map(s => s[key]).filter(v => v != null && !isNaN(v));
    if (vals.length < 2) return null;
    const m = vals.reduce((a, b) => a + b, 0) / vals.length;
    return Math.sqrt(vals.reduce((a, b) => a + (b - m) ** 2, 0) / vals.length);
  };
  const passStdScore  = stdDev(passStudents.filter(s => s.exam_score   != null), 'exam_score');
  const passStdHours  = stdDev(passStudents.filter(s => s.total_hours  != null), 'total_hours');
  const passStdLevel  = stdDev(passStudents.filter(s => s.level        != null), 'level');
  const passStdReview = stdDev(passStudents.filter(s => s.review_given != null), 'review_given');

  // z スコア（合格者平均・標準偏差を基準）
  const zScore = (val, mean, sd) => (val != null && mean != null && sd > 0) ? (val - mean) / sd : null;
  const zCell = (z) => {
    if (z == null) return `<span style="color:var(--text-dim)">—</span>`;
    const color = z >= 0 ? 'var(--green)' : 'var(--red)';
    const sign  = z >= 0 ? '+' : '';
    return `<span style="color:${color};font-weight:700">${sign}${z.toFixed(2)}σ</span>`;
  };
  const valCell = (val, mean, fmt) => {
    if (val == null || mean == null) return `<span style="color:var(--text-dim)">—</span>`;
    const diff = val - mean;
    const color = diff >= 0 ? 'var(--green)' : 'var(--red)';
    const sign  = diff >= 0 ? '+' : '';
    return `<span style="white-space:nowrap">${fmt(val)} <span style="color:${color};font-size:11px">(${sign}${fmt(diff)})</span></span>`;
  };

  // 全3条件クリアでも不合格の人（Megatoron等の影響を受けた可能性）
  const allStudentsWithResult = students.filter(s => passes[s.login] === 'pass' || passes[s.login] === 'fail');
  const allThresholdFail = failStudents.filter(s => condCount(s) === 3);

  // ─── 点双列相関係数（Point-Biserial Correlation） ───
  // 合否（二値: pass=1, fail=0）と各連続変数の相関
  const pbCorr = (key, getFn) => {
    const valid = allStudentsWithResult.filter(s => {
      const v = getFn ? getFn(s) : s[key];
      return v != null && !isNaN(v);
    });
    if (valid.length < 3) return null;
    const pGroup = valid.filter(s => passes[s.login] === 'pass');
    const fGroup = valid.filter(s => passes[s.login] === 'fail');
    if (pGroup.length === 0 || fGroup.length === 0) return null;
    const getVal = (s) => getFn ? getFn(s) : s[key];
    const mp = pGroup.reduce((a, s) => a + getVal(s), 0) / pGroup.length;
    const mf = fGroup.reduce((a, s) => a + getVal(s), 0) / fGroup.length;
    const allVals = valid.map(getVal);
    const mean = allVals.reduce((a, b) => a + b, 0) / allVals.length;
    const sn = Math.sqrt(allVals.reduce((a, v) => a + (v - mean) ** 2, 0) / allVals.length);
    if (sn === 0) return null;
    const n = allVals.length, n1 = pGroup.length, n0 = fGroup.length;
    return { r: (mp - mf) / sn * Math.sqrt(n1 * n0 / (n * n)), n, mp, mf };
  };

  const corrResults = [
    { key: 'exam_score',  label: 'Final Exam',   icon: '📝', ...pbCorr('exam_score') },
    { key: 'level',       label: 'Level',         icon: '📊', ...pbCorr('level') },
    { key: 'total_hours', label: 'ログイン時間',  icon: '⏱️', ...pbCorr('total_hours') },
    { key: 'review_given',label: 'レビュー回数',  icon: '👥', ...pbCorr('review_given') },
    { key: 'active_days', label: 'アクティブ日数', icon: '📅', ...pbCorr('active_days',
      s => s.active_days != null && s.active_days > 0 ? s.active_days : null) },
  ].filter(c => c.r != null).sort((a, b) => Math.abs(b.r) - Math.abs(a.r));

  // 強さラベル（バーグラデ用に実色コード）
  const corrLabel = (r) => {
    const a = Math.abs(r);
    if (a >= 0.7) return { text: '強い相関',      color: '#00b894', bg: 'rgba(0,184,148,0.18)' };
    if (a >= 0.5) return { text: '中程度の相関',  color: '#00cec9', bg: 'rgba(0,206,201,0.18)' };
    if (a >= 0.3) return { text: '弱い相関',      color: '#fdcb6e', bg: 'rgba(253,203,110,0.18)' };
    return         { text: '非常に弱い',          color: '#8888a0', bg: 'rgba(136,136,160,0.12)' };
  };

  // ─── 合否予測モデル（相関係数加重スコア） ───
  const factorStats = {};
  for (const c of corrResults) {
    const getVal = c.key === 'daily_avg'
      ? (s) => (s.total_hours != null && s.active_days > 0) ? s.total_hours / s.active_days : null
      : c.key === 'active_days'
      ? (s) => (s.active_days != null && s.active_days > 0) ? s.active_days : null
      : (s) => s[c.key];
    const vals = allStudentsWithResult.map(getVal).filter(v => v != null && !isNaN(v));
    if (vals.length < 2) continue;
    const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
    const std = Math.sqrt(vals.reduce((a, v) => a + (v - mean) ** 2, 0) / vals.length);
    if (std > 0) factorStats[c.key] = { mean, std, r: c.r, getVal };
  }

  // 予測スコア = Σ(r_i × z_i) / Σ|r_i|
  const predScore = (s) => {
    let score = 0, wSum = 0;
    for (const [key, st] of Object.entries(factorStats)) {
      const v = st.getVal(s);
      if (v == null) continue;
      const z = (v - st.mean) / st.std;
      score += z * st.r;
      wSum += Math.abs(st.r);
    }
    return wSum > 0 ? score / wSum : null;
  };

  const predData = allStudentsWithResult
    .map(s => ({ login: s.login, actual: passes[s.login], score: predScore(s) }))
    .filter(p => p.score != null)
    .sort((a, b) => b.score - a.score);

  // 最適閾値を探索（全候補で精度最大化）
  let bestAcc = 0, bestTh = 0;
  if (predData.length > 0) {
    const scores = predData.map(p => p.score);
    const candidates = [...new Set(scores)].sort((a, b) => a - b);
    for (let i = 0; i < candidates.length; i++) {
      const th = (i === 0) ? candidates[0] - 0.01 : (candidates[i] + candidates[i - 1]) / 2;
      const correct = predData.filter(p =>
        (p.score >= th && p.actual === 'pass') || (p.score < th && p.actual === 'fail')
      ).length;
      const acc = correct / predData.length;
      if (acc > bestAcc) { bestAcc = acc; bestTh = th; }
    }
  }
  const predAccPct = (bestAcc * 100).toFixed(1);
  const unexplainedPct = ((1 - bestAcc) * 100).toFixed(1);

  // 誤分類 = Megatoron推定影響
  const falseNeg = predData.filter(p => p.score >= bestTh && p.actual === 'fail');  // 数値的には合格圏だが不合格
  const falsePos = predData.filter(p => p.score < bestTh && p.actual === 'pass');   // 数値的には不合格圏だが合格

  // ギリギリ合格者 = 全条件クリア かつ 総合偏差スコアが合格者平均以下（compositeZ < 0）
  // ※ compositeZ は後で定義するため、後処理で計算
  // グループ別平均ヘルパー
  const groupAvg = (group) => ({
    exam:   avg(group.filter(s => s.exam_score  != null), 'exam_score'),
    hours:  avg(group.filter(s => s.total_hours != null), 'total_hours'),
    level:  avg(group.filter(s => s.level       != null), 'level'),
    review: avg(group.filter(s => s.review_given != null), 'review_given'),
  });

  // 合格者vs不合格者の総合偏差スコア（z スコア合計）
  const compositeZ = (s) => {
    const ze = zScore(s.exam_score,  passAvgScore,  passStdScore);
    const zh = zScore(s.total_hours, passAvgHours,  passStdHours);
    const zl = zScore(s.level,       passAvgLevel,  passStdLevel);
    const vals = [ze, zh, zl].filter(v => v != null);
    return vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  };

  // ギリギリ合格者（compositeZ が定義された後で計算）
  const borderlinePassers = passStudents.filter(s => condCount(s) === 3 && (compositeZ(s) ?? 0) < 0);

  // グループ別平均（compositeZ 込み）
  const groupAvgFull = (group) => {
    const g = groupAvg(group);
    const czs = group.map(compositeZ).filter(v => v != null);
    g.cz = czs.length ? czs.reduce((a,b)=>a+b,0)/czs.length : null;
    return g;
  };

  const gAll  = groupAvgFull(passStudents);
  const gBL   = groupAvgFull(borderlinePassers);
  const gFail = groupAvgFull(allThresholdFail);

  // グループ比較テーブル行
  const gcRow = (label, g, color, bold) => `<tr>
    <td style="color:${color};font-weight:${bold?'700':'400'}">${label}</td>
    <td style="text-align:center;color:${color};font-weight:${bold?'700':'400'}">${g.exam != null ? Math.round(g.exam)+'点' : '—'}</td>
    <td style="text-align:center;color:${color};font-weight:${bold?'700':'400'}">${g.hours != null ? g.hours.toFixed(0)+'h' : '—'}</td>
    <td style="text-align:center;color:${color};font-weight:${bold?'700':'400'}">${g.level != null ? g.level.toFixed(2) : '—'}</td>
    <td style="text-align:center;color:${color};font-weight:${bold?'700':'400'}">${g.review != null ? g.review.toFixed(1) : '—'}</td>
    <td style="text-align:center;color:${color};font-weight:bold">${g.cz != null ? (g.cz>=0?'+':'')+g.cz.toFixed(2)+'σ' : '—'}</td>
  </tr>`;

  // ギリギリ合格者 + 全条件クリア不合格者を混在表示（総合偏差σ降順）
  const mixedGroup = [
    ...borderlinePassers.map(s => ({ ...s, _result: 'pass' })),
    ...allThresholdFail.map(s  => ({ ...s, _result: 'fail' })),
  ].sort((a, b) => (compositeZ(b) ?? -99) - (compositeZ(a) ?? -99));

  // 値+σを縦積み1セルにするヘルパー
  const stackCell = (val, mean, fmtVal, z) => {
    if (val == null) return `<td style="text-align:center;color:var(--text-dim)">—</td>`;
    const diff  = mean != null ? val - mean : null;
    const dSign = diff != null ? (diff >= 0 ? '+' : '') : '';
    const dColor= diff != null ? (diff >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--text-dim)';
    const zStr  = z != null ? `<div style="font-size:10px;color:${z>=0?'var(--green)':'var(--red)'};font-weight:700">${z>=0?'+':''}${z.toFixed(2)}σ</div>` : '';
    return `<td style="text-align:center;white-space:nowrap;line-height:1.3;padding:4px 6px">
      <div style="font-size:12px">${fmtVal(val)}</div>
      ${diff != null ? `<div style="font-size:10px;color:${dColor}">(${dSign}${fmtVal(diff)})</div>` : ''}
      ${zStr}
    </td>`;
  };

  const deviationRows = mixedGroup.map(s => {
      const isPasser = s._result === 'pass';
      const ze = zScore(s.exam_score,   passAvgScore,   passStdScore);
      const zh = zScore(s.total_hours,  passAvgHours,   passStdHours);
      const zl = zScore(s.level,        passAvgLevel,   passStdLevel);
      const zr = zScore(s.review_given, passAvgReview,  passStdReview);
      const cz = compositeZ(s);
      const czColor = cz == null ? 'var(--text-dim)' : cz >= 0 ? 'var(--accent-light)' : 'var(--red)';
      const rowBg   = isPasser
        ? 'background:rgba(0,206,201,0.04);'
        : 'background:rgba(255,118,117,0.03);';
      const resultBadge = isPasser
        ? `<span style="padding:1px 7px;border-radius:10px;background:rgba(0,206,201,0.15);color:var(--green);font-size:10px;font-weight:700">合格</span>`
        : `<span style="padding:1px 7px;border-radius:10px;background:rgba(255,118,117,0.15);color:var(--red);font-size:10px;font-weight:700">不合格</span>`;
      return `<tr style="${rowBg}">
        <td style="white-space:nowrap">
          <a href="index.html?login=${encodeURIComponent(s.login)}" style="color:var(--accent-light);text-decoration:none">${s.login}</a>

        ${stackCell(s.total_hours,  passAvgHours,  v => v.toFixed(0)+'h',   zh)}
        ${stackCell(s.level,        passAvgLevel,  v => v.toFixed(2),        zl)}

  // 合格者の参考行（平均）

  // --- テーブル行（条件チェック列付き）---
  const failRows = sortedFail.map((s, i) => {

        ${corrResults.length >= 2 ? `2位は <strong style="color:var(--text)">${corrResults[1].label}</strong>（r=${corrResults[1].r.toFixed(3)}）。` : ''}

      </div>` : ''}

      <div style="color:rgba(255,255,255,0.35);font-size:12px;margin-top:8px;line-height:1.6">
        ※ 予測モデルは相関係数加重zスコアの単純線形モデル。因果関係ではなく相関に基づく推定です。<br>
        ※ 「Megatoron」とは仲間による推薦投票のこと。Piscine期間中に「この人と一緒に入学したい」と思う仲間を選ぶ投票で、結果が合否に影響するとされています（詳細は非公開）。
      </div>
    </div>` : ''}

    <!-- グループ比較（合格者全体 / ギリギリ合格者 / 全条件クリア不合格者） -->
    ${allThresholdFail.length > 0 ? `
    <div style="margin-bottom:20px">
      <div style="color:var(--accent-light);font-weight:700;font-size:13px;margin-bottom:6px">
        🔍 グループ別平均比較
      </div>
      <div style="color:var(--text-dim);font-size:11px;margin-bottom:8px;line-height:1.7">
        <span style="color:var(--green)">■ 合格者全体</span> vs
        <span style="color:var(--orange)">■ ギリギリ合格者</span>（全条件クリア かつ 総合偏差 &lt; 0 = ${borderlinePassers.length}人）vs
        <span style="color:var(--red)">■ 全条件クリア不合格者</span>（${allThresholdFail.length}人）<br>
        ギリギリ合格者と不合格者の数値が近い場合 → 差は <strong style="color:var(--text)">数値では捉えられない何らかの評価基準（Megatoron等と推察）</strong> にある可能性が高い
      </div>
      <div style="overflow-x:auto">
        <table class="corr-table" style="font-size:12px;min-width:480px">
          <thead><tr>
            <th>グループ</th>
            <th style="text-align:center">Exam平均</th>
            <th style="text-align:center">時間平均</th>
            <th style="text-align:center">Level平均</th>
            <th style="text-align:center">レビュー平均</th>
            <th style="text-align:center">総合偏差σ</th>
          </tr></thead>
          <tbody>
            ${gcRow('合格者全体（'+passStudents.length+'人）', gAll, 'var(--green)', true)}
            ${gcRow('ギリギリ合格（'+borderlinePassers.length+'人）', gBL, 'var(--orange)', false)}
            ${gcRow('全条件クリア不合格（'+allThresholdFail.length+'人）', gFail, 'var(--red)', false)}
          </tbody>
        </table>
      </div>
    </div>

    <!-- ギリギリ合格者 + 全条件クリア不合格者 混在比較 -->
    <div style="margin-bottom:20px">
      <div style="font-weight:700;font-size:12px;margin-bottom:4px">
        <span style="color:var(--green)">■ ギリギリ合格（${borderlinePassers.length}人）</span>
        <span style="color:var(--text-dim);margin:0 6px">×</span>
        <span style="color:var(--red)">■ 全条件クリア不合格（${allThresholdFail.length}人）</span>
        <span style="color:var(--text-dim);font-size:11px;margin-left:8px">— 総合偏差σ降順</span>
      </div>
      <div style="color:var(--text-dim);font-size:11px;margin-bottom:8px">
        数値が近いのに結果が違う行に注目すると、数値以外の評価基準の影響が見えてきます。
      </div>
      <div style="overflow-x:auto">
        <table class="corr-table" style="font-size:12px">
          <thead><tr>
            <th>ログイン</th>
            <th style="text-align:center;color:var(--orange)">総合偏差σ</th>
            <th style="text-align:center">Exam<br><span style="font-size:9px;color:var(--text-dim);font-weight:400">(差分/σ)</span></th>
            <th style="text-align:center">時間<br><span style="font-size:9px;color:var(--text-dim);font-weight:400">(差分/σ)</span></th>
            <th style="text-align:center">Level<br><span style="font-size:9px;color:var(--text-dim);font-weight:400">(差分/σ)</span></th>
            <th style="text-align:center">レビュー数<br><span style="font-size:9px;color:var(--text-dim);font-weight:400">(差分/σ)</span></th>
          </tr></thead>
          <tbody>
            ${passRefRow}
            ${deviationRows}
          </tbody>
        </table>
      </div>
    </div>` : ''}

    <!-- 不合格者一覧（ソート可能） -->
    <div style="margin-top:16px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <span class="all-corr-title" style="margin-bottom:0">不合格者一覧</span>
        <span style="color:var(--text-dim);font-size:11px">ソート:</span>
        ${sortBtn('exam',   'Exam点数')}
        ${sortBtn('hours',  'ログイン時間')}
        ${sortBtn('level',  'Level')}
        ${sortBtn('review', 'レビュー数')}
      </div>
      <div style="overflow-x:auto">
        <table class="corr-table">
          <thead><tr>
            <th>#</th>
            <th>ログイン</th>
            <th>Exam</th>
            <th>時間(h)</th>
            <th>Level</th>
            <th>レビュー数</th>
            <th style="text-align:center;font-size:10px">E/T/L</th>
            <th style="text-align:center">条件</th>
          </tr></thead>
          <tbody>${failRows}${failNoScoreRows}</tbody>
        </table>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
// 全ペア相関テーブル
// ─────────────────────────────────────────────
function buildAllCorrTable() {
  const tbody = document.getElementById('corrTableBody');
  tbody.innerHTML = '';

  TABS.forEach((tab, i) => {
    const pts = currentStudents().map(s=>({
      x: s[tab.xKey], y: s[tab.yKey],
    })).filter(p=>p.x!=null&&p.y!=null&&!isNaN(p.x)&&!isNaN(p.y));

    const reviewTab = (tab.xKey==='review_given'||tab.yKey==='review_given');
    if (reviewTab && !hasReviewData) {
      tbody.innerHTML += `<tr onclick="switchTab(${i})">
        <td>${tab.label}</td>
        <td style="color:var(--text-dim)">—</td>
        <td style="color:var(--text-dim);font-size:11px">データ更新待ち</td>
        <td style="color:var(--text-dim)">—</td>
      </tr>`;
      return;
    }

    const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
    const r = pearsonR(xs, ys);
    const interp = rInterp(r);
    tbody.innerHTML += `<tr onclick="switchTab(${i})">
      <td>${tab.label}</td>
      <td style="font-weight:700;color:${rColor(r)}">${r.toFixed(3)}</td>
      <td><span style="font-size:11px;color:${interp.color}">${interp.text}</span></td>
      <td style="color:var(--text-dim)">${pts.length}<span style="font-size:10px"> (active)</span></td>
    </tr>`;
  });

  document.getElementById('allCorrTable').style.display = 'block';
}

// ─────────────────────────────────────────────
// 起動
// ─────────────────────────────────────────────
requireAuth().then(user => {
  if (!user) return;
  currentUser = user;
  // 管理者のみタブボタンを表示
  if (user.login === ADMIN_LOGIN) {
    document.getElementById('tabBtn3').style.display = '';
    document.getElementById('tabBtn4').style.display = '';
  }
  loadData(user).catch(e => {
    document.getElementById('mainCard').innerHTML =
      `<div class="loading" style="color:var(--red)">データ読み込みエラー: ${e.message}</div>`;
  });
});
</script>
</body>
</html>
