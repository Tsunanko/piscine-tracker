<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piscine Dashboard - 42 Tokyo</title>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #22222e;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00cec9;
    --green-dim: #00b8941a;
    --red: #ff7675;
    --red-dim: #ff76751a;
    --orange: #fdcb6e;
    --gradient: linear-gradient(135deg, #6c5ce7, #00cec9);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 24px 0 16px;
  }
  .header-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* Stats summary */
  .summary {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .summary-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    text-align: center;
    flex: 1;
    max-width: 160px;
  }
  .summary-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .summary-value {
    font-size: 28px;
    font-weight: 800;
  }
  .summary-value.green { color: var(--green); }
  .summary-value.accent { color: var(--accent-light); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 8px 0;
    margin-bottom: 16px;
    -webkit-overflow-scrolling: touch;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .filter-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* Section headers */
  .section-header {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .section-header .dot.green {
    background: var(--green);
    box-shadow: 0 0 8px rgba(0, 206, 201, 0.5);
    animation: pulse 2s infinite;
  }
  .section-header .dot.dim {
    background: var(--text-dim);
    opacity: 0.4;
  }
  .section-count {
    color: var(--accent-light);
    font-weight: 600;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Student grid */
  .student-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }

  .student-card {
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    border: 1px solid transparent;
  }
  .student-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }
  .student-card.online {
    border-color: rgba(0, 206, 201, 0.3);
  }
  .student-card.online:hover {
    border-color: var(--green);
  }

  .student-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 6px;
    border: 2px solid var(--border);
    background: var(--surface);
  }
  .student-card.online .student-avatar {
    border-color: var(--green);
  }

  .avatar-placeholder {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    margin: 0 auto 6px;
    border: 2px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-dim);
  }
  .student-card.online .avatar-placeholder {
    border-color: var(--green);
  }

  .student-login {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .student-seat {
    font-size: 10px;
    color: var(--green);
    margin-top: 2px;
  }

  /* 時間(左) + Level(右) 横並び */
  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    width: 100%;
    padding: 0 6px;
    margin-top: 3px;
    gap: 2px;
  }
  .metric-hours {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-light);
  }
  .metric-hours.high { color: var(--green); }
  .metric-hours.low { color: var(--red); }
  .metric-level {
    font-size: 10px;
    color: var(--accent-light);
    font-weight: 600;
  }

  /* 偏差値セクション (トグル対象) */
  .dev-section { width: 100%; }
  .dev-label {
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-top: 4px;
    text-align: center;
    opacity: 0.7;
  }
  .dev-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0 6px;
    margin-top: 1px;
  }
  .dev-val {
    font-size: 9px;
    font-weight: 600;
  }

  /* 偏差値トグルOFF時 */
  .student-grid.hide-dev .dev-section { display: none; }
  /* ExamトグルOFF時 */
  .student-grid.hide-exam .exam-section { display: none; }

  .student-rank {
    font-size: 9px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  /* Sort bar */
  .sort-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .sort-bar label {
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .sort-btn {
    padding: 4px 10px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .sort-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 13px;
    color: var(--text-dim);
  }

  /* Error */
  .error-card {
    background: var(--red-dim);
    border: 1px solid rgba(255, 118, 117, 0.3);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin: 20px 0;
  }
  .error-card h3 { color: var(--red); margin-bottom: 8px; font-size: 15px; }
  .error-card p { font-size: 13px; color: var(--text-dim); }

  /* Updated timestamp */
  .updated {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    padding: 16px 0;
    opacity: 0.6;
  }

  /* Animations */
  .fade-in {
    animation: fadeIn 0.5s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Refresh button */
  .refresh-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(108, 92, 231, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    z-index: 10;
  }
  .refresh-btn:active { transform: scale(0.9); }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 24px;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* Search */
  .search-wrap {
    margin-bottom: 16px;
  }

  /* 合否カード色分け（合否トグルON時） */
  .student-grid.show-result .student-card.result-passed {
    border-color: rgba(253, 203, 110, 0.5);
  }
  .student-grid.show-result .student-card.result-passed:hover {
    border-color: var(--orange);
  }
  .student-grid.show-result .student-card.result-failed {
    border-color: rgba(255, 118, 117, 0.2);
  }

  /* 合否バッジ */
  .result-section { margin-top: 3px; }
  .result-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 8px;
  }
  .result-badge.passed {
    color: var(--orange);
    background: rgba(253, 203, 110, 0.12);
    border: 1px solid rgba(253, 203, 110, 0.35);
  }
  .result-badge.failed {
    color: var(--text-dim);
    background: rgba(136, 136, 160, 0.07);
    border: 1px solid rgba(136, 136, 160, 0.2);
  }
  /* 合否トグルOFF時は非表示 */
  .student-grid:not(.show-result) .result-section { display: none; }

  .search-input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }
</style>
<script src="auth.js"></script>
</head>
<body>
<script>
  // 同期ガード：トークンがなければ即リダイレクト（コンテンツのチラつき防止）
  if (!sessionStorage.getItem('piscine_42_token')) {
    window.location.replace('login.html');
  }
</script>
  <div class="container" id="app">
    <!-- ローディング -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading piscine data...</div>
    </div>

    <!-- ダッシュボード本体 -->
    <div id="dashContent" style="display:none">
      <div class="header fade-in">
        <div class="header-label">42 Tokyo</div>
        <h1>Piscine Dashboard</h1>
        <div class="header-sub" id="headerSub"></div>
        <!-- 月切り替えタブ（管理者のみ表示） -->
        <div id="monthTabs" style="display:none;margin-top:10px;gap:6px;justify-content:center;flex-wrap:wrap">
          <button id="tab2408" onclick="switchMonth('2408')" style="padding:4px 14px;border-radius:20px;border:1px solid rgba(136,136,160,0.3);background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer">2024年8月</button>
          <button id="tab2409" onclick="switchMonth('2409')" style="padding:4px 14px;border-radius:20px;border:1px solid rgba(136,136,160,0.3);background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer">2024年9月</button>
          <button id="tab02" onclick="switchMonth('02')" style="padding:4px 14px;border-radius:20px;border:1px solid rgba(110,168,254,0.4);background:rgba(110,168,254,0.15);color:var(--accent-light);font-size:12px;cursor:pointer">2026年2月</button>
          <button id="tab03" onclick="switchMonth('03')" style="padding:4px 14px;border-radius:20px;border:1px solid rgba(136,136,160,0.3);background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer">2026年3月</button>
        </div>
      </div>
      <div class="summary fade-in">
        <div class="summary-item">
          <div class="summary-label">Online</div>
          <div class="summary-value green" id="onlineCount">0</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">Total</div>
          <div class="summary-value accent" id="totalCount">0</div>
        </div>
        <div class="summary-item" id="passedSummary" style="display:none">
          <div class="summary-label" style="color:var(--orange)">合格</div>
          <div class="summary-value" style="color:var(--orange)" id="passedCount">0</div>
        </div>
      </div>
      <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="Search by login...">
      </div>
      <div class="filter-bar fade-in" id="filterBar"></div>
      <div class="sort-bar fade-in" id="sortBar"></div>
      <div class="section-header fade-in" id="sectionHeader"></div>
      <div class="student-grid fade-in" id="studentGrid"></div>
      <div class="empty-state fade-in" id="emptyState" style="display:none">No students found</div>
      <div class="updated" id="updatedText"></div>
    </div>

    <!-- エラー表示 -->
    <div id="errorContent" style="display:none">
      <div class="header">
        <div class="header-label">42 Tokyo</div>
        <h1>Piscine Dashboard</h1>
      </div>
      <div class="error-card" id="errorCard"></div>
    </div>
  </div>

  <button class="refresh-btn" id="refreshBtn" onclick="loadDashboard()" title="Refresh">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
      <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
    </svg>
  </button>

<script>
let dashboardData = null;
let loadSeq = 0; // 競合状態防止：最新のフェッチだけ反映する
let currentFilter = 'all';
let searchQuery = '';
let currentSort = 'hours'; // 'hours', 'level', 'composite', 'exam', 'name'
let isComposing = false;
let showDev = localStorage.getItem('showDev') !== 'false';
let showExam = localStorage.getItem('showExam') !== 'false';
let showResult = localStorage.getItem('showResult') === 'true'; // 合否表示（デフォルトOFF）
let loggedInUser = null; // ログイン中ユーザー情報
let userMonths = [];     // ユーザーが参加しているピシン月リスト
// URLパラメータ ?month=2408 等が指定されていれば初期月として使用
let currentMonth = (() => {
  const m = new URLSearchParams(location.search).get('month');
  return ['2408', '2409', '02', '03'].includes(m) ? m : '02';
})();

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function sortStudents(arr) {
  const sorted = [...arr];
  switch (currentSort) {
    case 'hours':
      sorted.sort((a, b) => {
        // fetch_failed は末尾に（0h学生より後ろ）
        if (a.fetch_failed && !b.fetch_failed) return 1;
        if (!a.fetch_failed && b.fetch_failed) return -1;
        return (b.total_hours || 0) - (a.total_hours || 0);
      });
      break;
    case 'level':
      sorted.sort((a, b) => (b.level || 0) - (a.level || 0));
      break;
    case 'composite':
      sorted.sort((a, b) => (b.composite_deviation || 50) - (a.composite_deviation || 50));
      break;
    case 'exam':
      sorted.sort((a, b) => {
        const aScore = a.exam_score != null ? a.exam_score : -1;
        const bScore = b.exam_score != null ? b.exam_score : -1;
        return bScore - aScore;
      });
      break;
    case 'name':
      sorted.sort((a, b) => a.login.localeCompare(b.login));
      break;
  }
  return sorted;
}

function toggleDev() {
  showDev = !showDev;
  localStorage.setItem('showDev', String(showDev));
  applyDisplayState();
  const btn = document.getElementById('toggleDevBtn');
  if (btn) btn.classList.toggle('active', showDev);
}

function toggleExam() {
  showExam = !showExam;
  localStorage.setItem('showExam', String(showExam));
  applyDisplayState();
  const btn = document.getElementById('toggleExamBtn');
  if (btn) btn.classList.toggle('active', showExam);
}

function toggleResult() {
  showResult = !showResult;
  localStorage.setItem('showResult', String(showResult));
  applyDisplayState();
  const btn = document.getElementById('toggleResultBtn');
  if (btn) btn.classList.toggle('active', showResult);
}

function applyDisplayState() {
  const grid = document.getElementById('studentGrid');
  if (grid) {
    grid.classList.toggle('hide-dev', !showDev);
    grid.classList.toggle('hide-exam', !showExam);
    grid.classList.toggle('show-result', showResult);
  }
}

function initSearchInput() {
  const input = document.getElementById('searchInput');
  if (!input) return;
  input.addEventListener('compositionstart', () => { isComposing = true; });
  input.addEventListener('compositionend', () => {
    isComposing = false;
    onSearch(input.value);
  });
  input.addEventListener('input', () => {
    if (!isComposing) onSearch(input.value);
  });
}

function formatHours(h, loading, failed) {
  if (loading) return '...';
  if (failed) return '--';      // データ取得失敗（0hと区別）
  if (h == null || h === 0) return '0h';
  return h >= 100 ? `${Math.round(h)}h` : `${h.toFixed(1)}h`;
}

function hoursClass(h, failed) {
  if (failed) return '';        // 取得失敗はニュートラル表示
  if (h >= 128) return 'high';  // 8h/day * 16 days = on track
  if (h < 64) return 'low';     // very behind
  return '';
}

function renderDashboard() {
  const d = dashboardData;
  const isAdmin = loggedInUser && loggedInUser.login === 'admin_user';

  // ローディング非表示・ダッシュボード表示
  document.getElementById('loading').style.display = 'none';
  document.getElementById('errorContent').style.display = 'none';
  document.getElementById('dashContent').style.display = '';

  // Build online lookup
  const onlineSet = new Set(d.online.map(s => s.login));
  const onlineMap = {};
  d.online.forEach(s => { onlineMap[s.login] = s; });

  // Merge all students into a single list
  let allStudents = [...d.online, ...d.offline].map(s => ({
    ...s,
    ...(onlineMap[s.login] || {}),
    _isOnline: onlineSet.has(s.login),
  }));

  // 合格発表済みなら全ユーザーが合否フィルター・バッジを使用可
  const canSeeResult = isAdmin || (d.results_announced === true);

  // Apply cluster / 合否 filter
  if (canSeeResult && currentFilter === 'passed') {
    allStudents = allStudents.filter(s => s.piscine_result === 'passed');
  } else if (canSeeResult && currentFilter === 'failed') {
    allStudents = allStudents.filter(s => s.piscine_result === 'failed');
  } else if (canSeeResult && currentFilter === 'enrolled') {
    allStudents = allStudents.filter(s => s.enrollment_42 === 'active');
  } else if (canSeeResult && currentFilter === 'cc_done') {
    allStudents = allStudents.filter(s => s.common_core_done === true);
  } else if (currentFilter !== 'all' && currentFilter !== 'passed' && currentFilter !== 'failed' && currentFilter !== 'enrolled' && currentFilter !== 'cc_done') {
    allStudents = allStudents.filter(s => s._isOnline && s.cluster === currentFilter);
  }

  // Apply search filter
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    allStudents = allStudents.filter(s => s.login.toLowerCase().includes(q) || (s.display_name || '').toLowerCase().includes(q));
  }

  // Apply sort
  allStudents = sortStudents(allStudents);

  // Build rank
  const allForRank = sortStudents([...d.online, ...d.offline]);
  const rankMap = {};
  allForRank.forEach((s, i) => { rankMap[s.login] = i + 1; });

  // Clusters
  const clusters = [...new Set(d.online.map(s => s.cluster).filter(Boolean))].sort();

  // Update header
  const periodLabel = currentMonth === '2408' ? 'Aug 5 - Aug 30, 2024'
                    : currentMonth === '2409' ? 'Sep 2 - Sep 27, 2024'
                    : currentMonth === '03'   ? 'Mar 16 - Apr 10, 2026'
                    :                          'Feb 2 - Feb 27, 2026';
  document.getElementById('headerSub').textContent = periodLabel;
  // 月タブ表示: 管理者は全タブ、一般ユーザーは参加月のタブのみ
  const monthTabs = document.getElementById('monthTabs');
  if (monthTabs && (isAdmin || (userMonths && userMonths.length > 0))) {
    if (isAdmin) {
      monthTabs.style.display = 'flex';
    } else {
      // 一般ユーザー: 参加月のタブだけ表示（02は常に表示）
      ['2408', '2409', '02', '03'].forEach(m => {
        const tab = document.getElementById(`tab${m}`);
        if (tab) tab.style.display = (m === '02' || userMonths.includes(m)) ? '' : 'none';
      });
      monthTabs.style.display = 'flex';
    }
  }
  document.getElementById('onlineCount').textContent = d.total_online;
  document.getElementById('totalCount').textContent = d.total_students;

  // 合否サマリーを更新（管理者かつ発表済みの場合のみ合格者数を表示）
  const passedSummary = document.getElementById('passedSummary');
  if (isAdmin && d.results_announced && d.passed_count != null) {
    if (passedSummary) {
      passedSummary.style.display = '';
      document.getElementById('passedCount').textContent = d.passed_count;
    }
  } else {
    if (passedSummary) passedSummary.style.display = 'none';
  }

  // Update filter bar
  const filterBtns = [
    `<button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>`
  ];
  clusters.forEach(c => {
    const count = d.online.filter(s => s.cluster === c).length;
    filterBtns.push(
      `<button class="filter-btn ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${esc(c)}')">${esc(c)} (${count})</button>`
    );
  });
  // 合否フィルターボタン（合格発表済みなら全ユーザーに表示）
  if (d.results_announced && canSeeResult) {
    filterBtns.push(
      `<button class="filter-btn ${currentFilter === 'passed' ? 'active' : ''}" onclick="setFilter('passed')" style="${currentFilter !== 'passed' ? 'color:var(--orange);border-color:rgba(253,203,110,0.35)' : ''}">🎉 合格 (${d.passed_count ?? 0})</button>`
    );
    filterBtns.push(
      `<button class="filter-btn ${currentFilter === 'failed' ? 'active' : ''}" onclick="setFilter('failed')">🏊 次回 (${d.failed_count ?? 0})</button>`
    );
    const enrolledCount = [...d.online, ...d.offline].filter(s => s.enrollment_42 === 'active').length;
    if (enrolledCount > 0) {
      filterBtns.push(
        `<button class="filter-btn ${currentFilter === 'enrolled' ? 'active' : ''}" onclick="setFilter('enrolled')" style="${currentFilter !== 'enrolled' ? 'color:#00cec9;border-color:rgba(0,206,201,0.35)' : ''}">🏫 在籍中 (${enrolledCount})</button>`
      );
    }
    const ccCount = [...d.online, ...d.offline].filter(s => s.common_core_done === true).length;
    if (ccCount > 0) {
      filterBtns.push(
        `<button class="filter-btn ${currentFilter === 'cc_done' ? 'active' : ''}" onclick="setFilter('cc_done')" style="${currentFilter !== 'cc_done' ? 'color:#a29bfe;border-color:rgba(162,155,254,0.35)' : ''}">🎓 CC完了 (${ccCount})</button>`
      );
    }
  }
  document.getElementById('filterBar').innerHTML = filterBtns.join('');

  // Update sort bar
  const sortBtnsHTML = [
    { key: 'hours', label: '時間' },
    { key: 'level', label: 'Level' },
    { key: 'composite', label: '総合' },
    { key: 'exam', label: 'Exam' },
    { key: 'name', label: 'Name' },
  ].map(s =>
    `<button class="sort-btn ${currentSort === s.key ? 'active' : ''}" onclick="setSort('${s.key}')">${s.label}</button>`
  ).join('');
  const adminLink = loggedInUser && loggedInUser.login === 'admin_user'
    ? `<span style="width:1px;height:14px;background:var(--border);margin:0 4px;display:inline-block;vertical-align:middle"></span>
       <a href="compare.html" class="sort-btn" style="text-decoration:none;color:var(--green);border-color:rgba(0,206,201,0.3)">🔬 比較</a>
       <a href="admin.html" class="sort-btn" style="text-decoration:none;color:#fdcb6e;border-color:#fdcb6e44">🔐 Admin</a>`
    : '';
  document.getElementById('sortBar').innerHTML = `
    <label>Sort:</label>
    ${sortBtnsHTML}
    <span style="width:1px;height:14px;background:var(--border);margin:0 4px;display:inline-block;vertical-align:middle"></span>
    <button class="sort-btn ${showDev ? 'active' : ''}" id="toggleDevBtn" onclick="toggleDev()">偏差値</button>
    <button class="sort-btn ${showExam ? 'active' : ''}" id="toggleExamBtn" onclick="toggleExam()">Exam</button>
    ${(d.results_announced && canSeeResult) ? `<button class="sort-btn ${showResult ? 'active' : ''}" id="toggleResultBtn" onclick="toggleResult()">合否</button>` : ''}
    <span style="width:1px;height:14px;background:var(--border);margin:0 4px;display:inline-block;vertical-align:middle"></span>
    <a id="statsNavBtn" href="stats.html" class="sort-btn" style="text-decoration:none">📊 統計</a>
    ${adminLink}
  `;

  // Update section header
  document.getElementById('sectionHeader').innerHTML =
    `${{hours:'時間ランキング', level:'Level ランキング', composite:'総合ランキング', exam:'Exam ランキング', name:'全学生'}[currentSort] || '全学生'} <span class="section-count">(${allStudents.length}人)</span>`;

  // Build student cards
  function makeCard(student) {
    const isOnline = student._isOnline;
    const cls = isOnline ? 'online' : '';
    const avatar = student.image_small
      ? `<img class="student-avatar" src="${esc(student.image_small)}" alt="${esc(student.login)}" onerror="this.outerHTML='<div class=\\'avatar-placeholder\\'>${esc(student.login[0].toUpperCase())}</div>'">`
      : `<div class="avatar-placeholder">${esc(student.login[0].toUpperCase())}</div>`;
    const seat = isOnline && student.host
      ? `<div class="student-seat">${esc(student.host.split('.')[0])}</div>`
      : '';
    const failed = student.fetch_failed === true;
    const hours = student.total_hours || 0;
    const rankNum = rankMap[student.login] || '-';
    const rankPrefix = currentSort === 'hours' ? '時'
                     : currentSort === 'level' ? 'Lv'
                     : currentSort === 'composite' ? '総'
                     : currentSort === 'exam' ? 'Ex'
                     : '';
    const rank = `${rankPrefix}#${rankNum}`;
    const level = student.level != null ? student.level.toFixed(2) : '-';
    const hDev = student.hours_deviation != null ? Math.round(student.hours_deviation) : null;
    const lDev = student.level_deviation != null ? Math.round(student.level_deviation) : null;
    const devColor = (v) => v == null ? 'var(--text-dim)'
                          : v >= 55 ? 'var(--green)'
                          : v >= 45 ? 'var(--text-dim)'
                          : 'var(--red)';
    const hStr = hDev != null ? hDev : '-';
    const lStr = lDev != null ? lDev : '-';
    const cDev = student.composite_deviation != null ? Math.round(student.composite_deviation) : null;
    const cStr = cDev != null ? cDev : '-';
    const examScore = student.exam_score != null ? student.exam_score : null;
    const examColor = examScore == null ? 'var(--text-dim)'
                    : examScore >= 50 ? 'var(--green)'
                    : 'var(--red)';
    const examHTML = examScore != null
      ? `<span style="color:${examColor}">${examScore}</span>`
      : `<span style="color:var(--text-dim)">-</span>`;
    // 合否バッジ（合格発表済みなら全ユーザーに表示）
    const result = canSeeResult ? student.piscine_result : null;
    const resultCls = result === 'passed' ? 'result-passed' : result === 'failed' ? 'result-failed' : '';
    const enrollment42 = student.enrollment_42;
    const bhDays = student.blackhole_days_left;
    const survivalBadge = (result === 'passed' && enrollment42 != null)
      ? (enrollment42 === 'active'
          ? `<span style="font-size:8px;margin-left:4px;color:#00cec9">在籍中</span>`
          : enrollment42 === 'blackholed'
          ? `<span style="font-size:8px;margin-left:4px;color:#e17055">🕳BH</span>`
          : `<span style="font-size:8px;margin-left:4px;color:#636e72">退学</span>`)
      : '';
    const ccBadge = (result === 'passed' && student.common_core_done)
      ? `<span style="font-size:8px;margin-left:4px;color:#a29bfe">🎓</span>`
      : '';
    const resultBadgeHTML = result === 'passed'
      ? `<div class="result-section" style="white-space:nowrap"><span class="result-badge passed">🎉 合格</span>${survivalBadge}${ccBadge}</div>`
      : result === 'failed'
      ? `<div class="result-section"><span class="result-badge failed">次回へ</span></div>`
      : '';
    return `
      <div class="student-card ${cls} ${resultCls}" onclick="goToStudent('${esc(student.login)}')">
        <div class="student-rank">${rank}</div>
        ${avatar}
        <div class="student-login" title="${esc(student.display_name || student.login)}">${esc(student.login)}</div>
        <div class="metric-row">
          <span class="metric-hours ${hoursClass(hours, failed)}">${formatHours(hours, false, failed)}</span>
          <span class="metric-level">Lv ${level}</span>
        </div>
        <div class="dev-section">
          <div class="dev-label">偏差値</div>
          <div class="dev-row">
            <span class="dev-val" style="color:${devColor(hDev)}">時${hStr}</span>
            <span class="dev-val" style="color:${devColor(lDev)}">Lv${lStr}</span>
          </div>
          <div class="dev-row" style="margin-top:2px;justify-content:center">
            <span style="font-size:8px;color:var(--text-dim);margin-right:3px">総合</span>
            <span class="dev-val" style="color:${devColor(cDev)};font-size:10px">${cStr}</span>
          </div>
        </div>
        <div class="exam-section" style="font-size:9px;color:var(--text-dim);text-align:center;margin-top:3px">
          Exam: ${examHTML}
        </div>
        ${resultBadgeHTML}
        ${seat}
      </div>`;
  }

  // 学生グリッドを更新
  const grid = document.getElementById('studentGrid');
  const emptyState = document.getElementById('emptyState');
  if (allStudents.length > 0) {
    grid.innerHTML = allStudents.map(s => makeCard(s)).join('');
    grid.style.display = '';
    emptyState.style.display = 'none';
  } else {
    grid.innerHTML = '';
    grid.style.display = 'none';
    emptyState.style.display = '';
  }

  // Update footer
  document.getElementById('updatedText').innerHTML =
    `Updated: ${new Date(d.cached_at).toLocaleString('ja-JP', {timeZone:'Asia/Tokyo'})}
    &nbsp;·&nbsp;<a href="stats.html" style="color:var(--accent-light);text-decoration:none;font-size:11px">📊 統計分析</a>`;

  // Apply dev toggles
  applyDisplayState();
}

function setFilter(cluster) {
  currentFilter = cluster;
  renderDashboard();
}

function setSort(sortKey) {
  currentSort = sortKey;
  renderDashboard();
}

function onSearch(value) {
  searchQuery = value;
  renderDashboard();
}

function goToStudent(login) {
  const monthParam = currentMonth !== '02' ? `&month=${currentMonth}` : '';
  window.location.href = `index.html?login=${encodeURIComponent(login)}${monthParam}`;
}

async function loadDashboard() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  // 競合状態防止：このフェッチのシーケンス番号を記録し、
  // 完了時に最新のリクエストかどうか確認する
  const mySeq = ++loadSeq;
  const myMonth = currentMonth; // 呼び出し時の月を記録

  try {
    const token = sessionStorage.getItem('piscine_42_token') || '';
    const monthParam = myMonth !== '02' ? `?month=${myMonth}` : '';
    const resp = await fetch(`https://piscine-tracker.tsunanko.workers.dev/api/data${monthParam}`, {
      headers: token ? { Authorization: `Bearer ${token}` } : {},
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    // より新しいフェッチが開始されていたら、このレスポンスを捨てる
    if (mySeq !== loadSeq) return;

    dashboardData = data;
    renderDashboard();
  } catch (e) {
    if (mySeq === loadSeq) showError(e.message);
  } finally {
    if (mySeq === loadSeq) btn.classList.remove('spinning');
  }
}

function switchMonth(month) {
  if (currentMonth === month) return;
  currentMonth = month;
  currentFilter = 'all';
  // タブのスタイル切り替え
  ['2408', '2409', '02', '03'].forEach(m => {
    const tab = document.getElementById(`tab${m}`);
    if (!tab) return;
    if (m === month) {
      tab.style.background = 'rgba(110,168,254,0.15)';
      tab.style.color = 'var(--accent-light)';
      tab.style.borderColor = 'rgba(110,168,254,0.4)';
    } else {
      tab.style.background = 'transparent';
      tab.style.color = 'var(--text-dim)';
      tab.style.borderColor = 'rgba(136,136,160,0.3)';
    }
  });
  // 統計リンクのhrefを月に合わせて更新
  const statsBtn = document.getElementById('statsNavBtn');
  if (statsBtn) statsBtn.href = month !== '02' ? `stats.html?month=${month}` : 'stats.html';
  loadDashboard();
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('dashContent').style.display = 'none';
  document.getElementById('errorCard').innerHTML =
    `<h3>Error</h3><p>${msg}</p><p style="margin-top:12px;font-size:11px">Data is updated every 5 minutes via GitHub Actions</p>`;
  document.getElementById('errorContent').style.display = '';
}

function sendConsentSilently(user) {
  const token = sessionStorage.getItem('piscine_42_token') || '';
  const method = token.startsWith('piscine:') ? 'passphrase' : 'oauth';
  const consentedAt = localStorage.getItem('piscine_agreed_at') || new Date().toISOString();
  fetch('https://piscine-tracker.tsunanko.workers.dev/api/consent', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    },
    body: JSON.stringify({ login: user.login, consentedAt, method }),
  }).catch(() => {}); // エラーは無視（ユーザーへの影響なし）
}

// 認証確認後にダッシュボード読み込み
requireAuth().then(async user => {
  if (!user) return;
  loggedInUser = user; // 管理者リンク表示判定に使用
  initSearchInput(); // 検索入力欄のイベントを一度だけ登録
  sendConsentSilently(user);

  // ユーザーの参加月を取得（月タブ表示に使用）
  try {
    const token = getToken();
    const resp = await fetch('https://piscine-tracker.tsunanko.workers.dev/api/my-months', {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (resp.ok) {
      const data = await resp.json();
      userMonths = data.months || [];
    }
  } catch {}

  // URLパラメータで月が指定されていた場合、タブのスタイルと統計リンクを初期化
  if (currentMonth !== '02') {
    ['2408', '2409', '02', '03'].forEach(m => {
      const tab = document.getElementById(`tab${m}`);
      if (!tab) return;
      if (m === currentMonth) {
        tab.style.background = 'rgba(110,168,254,0.15)';
        tab.style.color = 'var(--accent-light)';
        tab.style.borderColor = 'rgba(110,168,254,0.4)';
      } else {
        tab.style.background = 'transparent';
        tab.style.color = 'var(--text-dim)';
        tab.style.borderColor = 'rgba(136,136,160,0.3)';
      }
    });
    const statsBtn = document.getElementById('statsNavBtn');
    if (statsBtn) statsBtn.href = `stats.html?month=${currentMonth}`;
  }
  loadDashboard();
  setInterval(loadDashboard, 5 * 60 * 1000);
});
</script>
</body>
