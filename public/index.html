<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piscine Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface2: #22222e;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00cec9;
    --green-dim: #00b8941a;
    --red: #ff7675;
    --red-dim: #ff76751a;
    --orange: #fdcb6e;
    --orange-dim: #fdcb6e1a;
    --gradient: linear-gradient(135deg, #6c5ce7, #00cec9);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    padding-bottom: 80px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 24px 0 20px;
  }
  .header-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-period {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* Big Circle Progress */
  .progress-ring-wrap {
    display: flex;
    justify-content: center;
    padding: 20px 0;
    position: relative;
  }
  .progress-ring-container {
    position: relative;
    width: 200px;
    height: 200px;
  }
  .progress-ring {
    transform: rotate(-90deg);
  }
  .progress-ring-bg {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 10;
  }
  .progress-ring-fill {
    fill: none;
    stroke: url(#gradient);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s ease;
  }
  .progress-ring-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .progress-big-num {
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .progress-unit {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .progress-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin: 8px auto 0;
  }
  .status-badge.on-track {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(0, 206, 201, 0.2);
  }
  .status-badge.behind {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(255, 118, 117, 0.2);
  }
  .status-badge.warning {
    background: var(--orange-dim);
    color: var(--orange);
    border: 1px solid rgba(253, 203, 110, 0.2);
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* Stat Grid */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-item {
    background: var(--surface2);
    border-radius: 12px;
    padding: 14px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 24px;
    font-weight: 700;
  }
  .stat-value.accent { color: var(--accent-light); }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.orange { color: var(--orange); }
  .stat-suffix {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-dim);
  }

  /* Remaining Alert */
  .remaining-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
    text-align: center;
  }
  .remaining-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .remaining-value {
    font-size: 48px;
    font-weight: 800;
    line-height: 1;
  }
  .remaining-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  /* Bar Chart */
  .chart-container {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0 -4px;
    padding: 0 4px;
  }
  .chart {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 120px;
    min-width: fit-content;
  }
  .chart-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 16px;
    flex: 1;
  }
  .chart-bar-wrap {
    width: 100%;
    height: 90px;
    display: flex;
    align-items: flex-end;
    position: relative;
  }
  .chart-bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    transition: height 0.5s ease;
    position: relative;
  }
  .chart-bar.met { background: var(--green); opacity: 0.8; }
  .chart-bar.partial { background: var(--accent-light); opacity: 0.7; }
  .chart-bar.zero { background: var(--surface2); min-height: 2px; }
  .chart-bar.future { background: var(--surface2); min-height: 2px; opacity: 0.3; }
  .chart-day {
    font-size: 9px;
    color: var(--text-dim);
  }
  .chart-target-line {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 1px dashed var(--red);
    opacity: 0.4;
    pointer-events: none;
    z-index: 1;
  }
  .chart-hours {
    font-size: 8px;
    color: var(--text-dim);
    position: absolute;
    top: -12px;
    width: 100%;
    text-align: center;
  }

  /* Tooltip */
  .chart-col:hover .chart-hours { color: var(--text); }
  .chart-col:hover .chart-bar { opacity: 1; }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 13px;
    color: var(--text-dim);
  }

  /* Error */
  .error-card {
    background: var(--red-dim);
    border: 1px solid rgba(255, 118, 117, 0.3);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin: 20px 0;
  }
  .error-card h3 { color: var(--red); margin-bottom: 8px; font-size: 15px; }
  .error-card p { font-size: 13px; color: var(--text-dim); }

  /* Updated timestamp */
  .updated {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    padding: 16px 0;
    opacity: 0.6;
  }

  /* Animations */
  .fade-in {
    animation: fadeIn 0.5s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Refresh button */
  .refresh-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(108, 92, 231, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    z-index: 10;
  }
  .refresh-btn:active { transform: scale(0.9); }

  /* Back link */
  .back-link {
    display: inline-block;
    color: var(--accent-light);
    text-decoration: none;
    font-size: 13px;
    padding: 8px 0;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 0.7; }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
<script src="auth.js"></script>
</head>
<body>
<script>
  if (!sessionStorage.getItem('piscine_42_token')) {
    window.location.replace('login.html');
  }
</script>
  <div class="container" id="app">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <a href="dashboard.html" class="back-link" style="margin-bottom:0">← Dashboard</a>
      <a id="statsLinkInit" href="stats.html" class="back-link" style="margin-bottom:0;color:var(--accent-light);border-color:var(--accent)">📊 統計</a>
    </div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading location data...</div>
    </div>
  </div>

  <button class="refresh-btn" id="refreshBtn" onclick="loadData()" title="Refresh">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
      <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
    </svg>
  </button>

  <svg width="0" height="0">
    <defs>
      <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6c5ce7"/>
        <stop offset="100%" stop-color="#00cec9"/>
      </linearGradient>
    </defs>
  </svg>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 85;
const params = new URLSearchParams(window.location.search);
const LOGIN = params.get('login') || 'yuichika';
const PAGE_MONTH = params.get('month') || '02'; // 3月Piscineの場合 '03'

// 初期表示の統計リンクにもloginを付ける
const initStatsLink = document.getElementById('statsLinkInit');
const monthSuffix = PAGE_MONTH !== '02' ? `&month=${PAGE_MONTH}` : '';
if (initStatsLink) initStatsLink.href = `stats.html?login=${encodeURIComponent(LOGIN)}${monthSuffix}`;

let currentStudentData = null;

function calcWeekly(daily) {
  if (!daily || daily.length === 0) return [];
  const weeks = [];
  for (let i = 0; i < daily.length; i += 7) {
    const slice = daily.slice(i, i + 7);
    const hours = +slice.reduce((s, d) => s + d.hours, 0).toFixed(1);
    // 週の開始日・終了日を取得（表示用）
    const startDate = slice[0]?.date || '';
    const endDate   = slice[slice.length - 1]?.date || '';
    const fmt = ds => {
      if (!ds) return '';
      const [, m, dd] = ds.split('-');
      return `${+m}/${+dd}`;
    };
    weeks.push({ hours, label: `${fmt(startDate)}-${fmt(endDate)}` });
  }
  return weeks;
}

function render(d) {
  currentStudentData = d;
  const isAdmin = loggedInUser?.login === 'admin_user';
  const app = document.getElementById('app');

  // Determine status
  let statusClass, statusText;
  if (d.on_track) {
    statusClass = 'on-track';
    statusText = 'On Track';
  } else if (d.diff_from_target > -10) {
    statusClass = 'warning';
    statusText = 'Slightly Behind';
  } else {
    statusClass = 'behind';
    statusText = 'Behind Schedule';
  }

  // Required avg color
  const reqAvgClass = d.required_avg_remaining <= 8 ? 'green' :
                      d.required_avg_remaining <= 10 ? 'orange' : 'red';

  // Daily chart
  const maxH = Math.max(12, ...d.daily.map(x => x.hours));
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);

  const bars = d.daily.map(day => {
    const pct = (day.hours / maxH) * 100;
    const isFuture = day.date > todayStr;
    const cls = isFuture ? 'future' : day.hours === 0 ? 'zero' : day.met_target ? 'met' : 'partial';
    const dd = new Date(day.date + 'T00:00:00+09:00').getDate();
    const hoursLabel = day.hours > 0 ? day.hours.toFixed(1) : '';
    return `
      <div class="chart-col">
        <div class="chart-bar-wrap">
          <div class="chart-bar ${cls}" style="height:${Math.max(2, pct)}%">
            ${hoursLabel ? `<span class="chart-hours">${hoursLabel}</span>` : ''}
          </div>
        </div>
        <span class="chart-day">${dd}</span>
      </div>`;
  }).join('');

  // Target line position
  const targetPct = (8 / maxH) * 100;

  // Progress ring offset
  const offset = CIRCUMFERENCE - (d.progress_pct / 100) * CIRCUMFERENCE;

  // ── 伸び率（週別）事前計算（isAdminのみ） ──
  const weeklyData = isAdmin ? calcWeekly(d.daily) : [];
  const weeklyHours = weeklyData.map(w => w.hours); // 後方互換
  let growthHTML = '';
  if (weeklyData.length >= 2) {
    const half = Math.floor(d.daily.length / 2);
    const firstH = +d.daily.slice(0, half).reduce((s, x) => s + x.hours, 0).toFixed(1);
    const secondH = +d.daily.slice(half).reduce((s, x) => s + x.hours, 0).toFixed(1);
    const trendPct = firstH > 0 ? (secondH - firstH) / firstH * 100 : null;
    const trendStr = trendPct !== null ? (trendPct >= 0 ? '+' : '') + trendPct.toFixed(1) + '%' : null;
    const trendColor = trendPct === null ? 'var(--text-dim)'
                     : trendPct >= 5 ? 'var(--green)'
                     : trendPct >= -5 ? 'var(--orange)' : 'var(--red)';
    const trendLabel = trendPct === null ? '' : trendPct >= 5 ? '後半に向けて活発化' : trendPct >= -5 ? '安定したペース' : '後半にペースダウン';
    const maxW = Math.max(0.1, ...weeklyHours);
    const wNumbers = ['1週目', '2週目', '3週目', '4週目'];
    const weekBars = weeklyData.map((w, i) => {
      const pct = (w.hours / maxW * 100).toFixed(1);
      const isLast = i === weeklyData.length - 1;
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="font-size:10px;color:var(--text-dim);width:36px">${wNumbers[i]}</div>
        <div style="flex:1;height:18px;background:var(--surface2);border-radius:4px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${isLast ? 'var(--orange)' : 'var(--accent)'};opacity:0.85;border-radius:4px;transition:width 0.5s"></div>
        </div>
        <div style="font-size:11px;color:var(--text);width:40px;text-align:right">${w.hours}h</div>
        <div style="font-size:9px;color:var(--text-dim);width:60px">${w.label}</div>
      </div>`;
    }).join('');
    const trendRow = trendStr ? `
      <div style="margin-top:10px;padding:10px 14px;background:var(--surface2);border-radius:10px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:10px;color:var(--text-dim);margin-bottom:3px">前半(1〜13日) → 後半(14〜26日)</div>
          <div style="font-size:12px;color:var(--text-dim)">${firstH}h → ${secondH}h &nbsp;<span style="color:${trendColor};font-size:11px">${trendLabel}</span></div>
        </div>
        <div style="font-size:24px;font-weight:800;color:${trendColor};margin-left:12px">${trendStr}</div>
      </div>` : '';
    growthHTML = `
    <div class="card fade-in">
      <div class="card-title">活動の推移（週別・伸び率）</div>
      ${weekBars}
      ${trendRow}
    </div>`;
  }

  // ── Exam スコア stat-item（isAdminのみ） ──
  const examStatHTML = (isAdmin && d.exam_score != null) ? `
        <div class="stat-item">
          <div class="stat-label">Final Exam</div>
          <div class="stat-value accent">${d.exam_score}<span class="stat-suffix">pt</span></div>
        </div>` : '';

  app.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <a href="dashboard.html" class="back-link" style="margin-bottom:0">← Dashboard</a>
      <a href="stats.html?login=${encodeURIComponent(d.login)}${monthSuffix}" class="back-link" style="margin-bottom:0;color:var(--accent-light);border-color:var(--accent)">📊 統計</a>
    </div>

    <!-- ヘッダー -->
    <div class="header fade-in">
      <div class="header-label">Piscine Commitment Tracker</div>
      ${d.image_small ? `<img src="${d.image_small}" alt="${d.login}" style="width:80px;height:80px;border-radius:50%;border:3px solid var(--accent);object-fit:cover;display:block;margin:0 auto 10px">` : ''}
      <h1>${d.login}</h1>
      <div class="header-period">${d.piscine_start} ~ ${d.piscine_end} (${d.piscine_days} days)</div>
    </div>

    <!-- 合否バナー（結果発表済み かつ 自分のプロフィール or 管理者のみ） -->
    ${(d.piscine_result && d.results_announced && (loggedInUser?.login === d.login || isAdmin)) ? (() => {
      if (d.piscine_result === 'passed') {
        return `<div class="fade-in" style="
          background: linear-gradient(135deg, rgba(253,203,110,0.15), rgba(253,203,110,0.05));
          border: 1px solid rgba(253,203,110,0.4);
          border-radius: 16px;
          padding: 20px;
          margin-bottom: 16px;
          text-align: center;
        ">
          <div style="font-size: 32px; margin-bottom: 8px">🎉</div>
          <div style="font-size: 18px; font-weight: 800; color: var(--orange); margin-bottom: 6px">
            42 Tokyo 入学おめでとうございます！
          </div>
          <div style="font-size: 13px; color: var(--text-dim); line-height: 1.6">
            Piscine を突破しました。<br>
            ここからが本当の始まりです。これからもよろしく！
          </div>
        </div>`;
      } else {
        return `<div class="fade-in" style="
          background: rgba(136,136,160,0.06);
          border: 1px solid rgba(136,136,160,0.2);
          border-radius: 16px;
          padding: 20px;
          margin-bottom: 16px;
          text-align: center;
        ">
          <div style="font-size: 32px; margin-bottom: 8px">🏊</div>
          <div style="font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px">
            Piscine、お疲れ様でした！
          </div>
          <div style="font-size: 13px; color: var(--text-dim); line-height: 1.6">
            挑戦したこと自体が大きな経験です。<br>
            ここで得たスキルは必ず次に活きます。また会いましょう！
          </div>
        </div>`;
      }
    })() : ''}

    <!-- 偏差値 2×2グリッド -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;max-width:340px;margin-left:auto;margin-right:auto" class="fade-in">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;text-align:center">
        <div style="font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Level</div>
        <div style="font-size:22px;font-weight:800;color:var(--accent-light)">${(d.level ?? 0).toFixed(2)}</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;text-align:center">
        <div style="font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">偏差値(時間)</div>
        <div style="font-size:22px;font-weight:800;color:${
          (d.hours_deviation ?? 50) >= 55 ? 'var(--green)' :
          (d.hours_deviation ?? 50) >= 45 ? 'var(--text)' : 'var(--red)'
        }">${d.hours_deviation != null ? Math.round(d.hours_deviation) : '-'}</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;text-align:center">
        <div style="font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">偏差値(Lv)</div>
        <div style="font-size:22px;font-weight:800;color:${
          (d.level_deviation ?? 50) >= 55 ? 'var(--green)' :
          (d.level_deviation ?? 50) >= 45 ? 'var(--text)' : 'var(--red)'
        }">${d.level_deviation != null ? Math.round(d.level_deviation) : '-'}</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;text-align:center;position:relative">
        <div style="font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">総合偏差値</div>
        <div style="font-size:22px;font-weight:800;color:${
          (d.composite_deviation ?? 50) >= 55 ? 'var(--green)' :
          (d.composite_deviation ?? 50) >= 45 ? 'var(--text)' : 'var(--red)'
        }">${d.composite_deviation != null ? Math.round(d.composite_deviation) : '-'}</div>
        <div style="font-size:9px;color:var(--text-dim);margin-top:2px">Lv・時間・レビューの平均</div>
      </div>
    </div>

    <!-- 全体での位置（ミニ散布図）-->
    <div class="card fade-in" style="padding:16px 14px 14px;margin-bottom:12px">
      <div class="card-title">全体での位置（時間 × Level）</div>
      <div style="font-size:11px;color:var(--text-dim);text-align:center;margin-bottom:6px">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ff7675;margin-right:4px;vertical-align:middle"></span>${d.login}
        &nbsp;&nbsp;
        <span style="display:inline-block;border-top:2px dashed rgba(253,203,110,0.7);width:16px;vertical-align:middle;margin-right:4px"></span>時間平均
        &nbsp;&nbsp;
        <span style="display:inline-block;border-top:2px dashed rgba(0,206,201,0.7);width:16px;vertical-align:middle;margin-right:4px"></span>Level平均
      </div>
      <div style="position:relative;height:200px;cursor:pointer" onclick="window.location.href='stats.html?login=${encodeURIComponent(d.login)}${monthSuffix}'">
        <canvas id="miniScatterCanvas"></canvas>
      </div>
      <div style="text-align:center;margin-top:8px">
        <a href="stats.html?login=${encodeURIComponent(d.login)}${monthSuffix}" style="font-size:12px;color:var(--accent-light);text-decoration:none">詳細統計を見る →</a>
      </div>
    </div>

    <!-- 目標達成率（プログレスリング）-->
    <div class="progress-ring-wrap fade-in">
      <div class="progress-ring-container">
        <svg class="progress-ring" width="200" height="200" viewBox="0 0 200 200">
          <circle class="progress-ring-bg" cx="100" cy="100" r="85"/>
          <circle class="progress-ring-fill" cx="100" cy="100" r="85"
            stroke-dasharray="${CIRCUMFERENCE}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="progress-ring-center">
          <div class="progress-big-num">${d.progress_pct.toFixed(1)}%</div>
          <div class="progress-unit">目標達成率</div>
          <div class="progress-sub" style="font-size:10px">1日8h × ${d.piscine_days}日 基準</div>
          <div style="font-size:10px;color:var(--text-dim);margin-top:2px">${d.total_logged_hours}h / ${d.total_target_hours}h</div>
        </div>
      </div>
    </div>

    <!-- ステータスバッジ -->
    <div style="text-align:center" class="fade-in">
      ${d.is_active ? `<div class="status-badge on-track" style="margin-bottom:6px">
        <span class="status-dot" style="animation:pulse 1.5s infinite"></span>
        Now Online (+${d.active_extra_hours.toFixed(1)}h live)
      </div><br>` : ''}
      <div class="status-badge ${statusClass}">
        <span class="status-dot"></span>
        ${statusText} (${d.diff_from_target >= 0 ? '+' : ''}${d.diff_from_target.toFixed(1)}h)
      </div>
    </div>

    <!-- 現在の状況 -->
    <div class="card fade-in" style="margin-top:16px">
      <div class="card-title">現在の状況</div>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-label">累計ログイン時間</div>
          <div class="stat-value accent">${d.total_logged_hours}<span class="stat-suffix">h</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">1日平均</div>
          <div class="stat-value ${d.avg_hours_per_day >= 8 ? 'green' : d.avg_hours_per_day >= 6 ? 'orange' : 'red'}">${d.avg_hours_per_day}<span class="stat-suffix">h</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">目標まで残り</div>
          <div class="stat-value ${d.remaining_hours_needed > 0 ? (d.remaining_hours_needed > 40 ? 'red' : 'orange') : 'green'}">${Math.max(0, d.remaining_hours_needed)}<span class="stat-suffix">h</span></div>
        </div>
        ${examStatHTML}
      </div>
      ${d.review_given != null ? `
      <div style="margin-top:10px;background:var(--surface2);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:11px;color:var(--text-dim)">レビュー回数（評価してあげた回数）</div>
        <div style="display:flex;align-items:baseline;gap:10px">
          <div style="font-size:20px;font-weight:700;color:var(--accent-light)">${d.review_given}<span style="font-size:12px;font-weight:400;color:var(--text-dim)"> 回</span></div>
          ${d.review_deviation != null ? `<div style="font-size:13px;font-weight:600;color:${
            d.review_deviation >= 55 ? 'var(--green)' :
            d.review_deviation >= 45 ? 'var(--text-dim)' : 'var(--red)'
          }">偏差値 ${Math.round(d.review_deviation)}</div>` : ''}
        </div>
      </div>` : ''}
    </div>

    <!-- 残り必要ペース -->
    ${d.remaining_days > 0 ? `
    <div class="remaining-card fade-in">
      <div class="remaining-title">残り ${d.remaining_days} 日間の必要ペース</div>
      <div class="remaining-value ${reqAvgClass}">${d.required_avg_remaining}<span class="stat-suffix"> h/日</span></div>
      <div class="remaining-desc">
        目標達成まで残り ${d.remaining_hours_needed}h（1日 ${d.target_hours_per_day}h × ${d.piscine_days}日 = ${d.total_target_hours}h 基準）
      </div>
    </div>` : ''}

    <!-- 日別チャート -->
    <div class="card fade-in">
      <div class="card-title">日別ログイン時間（2月）</div>
      <div class="chart-container" style="position:relative">
        <div class="chart">
          ${bars}
        </div>
        <div class="chart-target-line" style="bottom:calc(${targetPct}% * 90 / 100 + 24px)"></div>
      </div>
      <div style="margin-top:8px;display:flex;gap:12px;justify-content:center">
        <span style="font-size:10px;color:var(--text-dim)">
          <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--green);vertical-align:middle;margin-right:3px"></span>8h以上
        </span>
        <span style="font-size:10px;color:var(--text-dim)">
          <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--accent-light);vertical-align:middle;margin-right:3px"></span>8h未満
        </span>
        <span style="font-size:10px;color:var(--text-dim)">
          <span style="display:inline-block;width:8px;height:8px;border-radius:2px;border:1px dashed var(--red);vertical-align:middle;margin-right:3px;opacity:0.5"></span>8h目標ライン
        </span>
      </div>
    </div>

    <!-- 伸び率 -->
    ${growthHTML}

    <!-- 合格ライン参考（isAdminのみ・グローバルデータ取得後に挿入） -->
    <div id="thresholds-section"></div>

    <!-- 課題の進捗（最下部）-->
    ${d.projects && d.projects.length > 0 ? `
    <div class="card fade-in">
      <div class="card-title">課題の進捗</div>
      ${d.projects.map(p => {
        const color = p.status === 'in_progress' ? 'var(--orange)'
                    : p.status === 'waiting_for_correction' ? 'var(--accent-light)'
                    : p.validated ? 'var(--green)'
                    : 'var(--text-dim)';
        const label = p.status === 'in_progress' ? '進行中'
                    : p.status === 'waiting_for_correction' ? '採点待ち'
                    : p.validated ? '✓ ' + (p.final_mark ?? '')
                    : p.final_mark != null ? '✗ ' + p.final_mark
                    : '-';
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">'
             + '<span style="font-size:13px;color:var(--text)">' + p.name + '</span>'
             + '<span style="font-size:12px;font-weight:600;color:' + color + '">' + label + '</span>'
             + '</div>';
      }).join('')}
    </div>` : ''}

    <div class="updated">
      Updated: ${new Date(d.updated_at).toLocaleString('ja-JP', {timeZone:'Asia/Tokyo'})}
    </div>
  `;
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    const token = getToken();
    const monthParam = PAGE_MONTH !== '02' ? `?month=${PAGE_MONTH}` : '';
    const resp = await fetch(`https://piscine-tracker.tsunanko.workers.dev/api/data/${encodeURIComponent(LOGIN)}${monthParam}`, {
      headers: token ? { Authorization: `Bearer ${token}` } : {},
    });
    if (!resp.ok) throw new Error(`User "${LOGIN}" not found (HTTP ${resp.status})`);
    const data = await resp.json();
    render(data);
    renderMiniChart(data.login);  // 全体散布図（非同期・ノンブロッキング）
  } catch (e) {
    showError(e.message);
  } finally {
    btn.classList.remove('spinning');
  }
}

// ─── Mini Scatter Chart ───────────────────────
let miniChartInstance = null;

async function renderMiniChart(login) {
  try {
    const token = getToken();
    const monthParam = PAGE_MONTH !== '02' ? `?month=${PAGE_MONTH}` : '';
    const res = await fetch(`https://piscine-tracker.tsunanko.workers.dev/api/data${monthParam}`, {
      headers: token ? { Authorization: `Bearer ${token}` } : {},
    });
    const d = await res.json();
    const all = [...(d.online || []), ...(d.offline || [])];

    // is_active フィールドがある場合はアクティブ学生のみを偏差値基準母集団として使用
    // → stats.html の散布図と同じ母集団になり、平均線が一致する
    // 旧 data.json（is_active なし）は全学生にフォールバック
    const hasActive = all.some(s => 'is_active' in s);
    const base = hasActive ? all.filter(s => s.is_active) : all;

    const pts = base
      .filter(s => s.total_hours != null && s.total_hours > 0 && s.level != null && s.level > 0)
      .map(s => ({ x: s.total_hours, y: s.level, login: s.login }));

    // 現在のユーザーが非アクティブでも散布図には全学生を表示（グレーアウト）
    const allPts = all
      .filter(s => s.total_hours != null && s.total_hours > 0 && s.level != null && s.level > 0)
      .map(s => ({ x: s.total_hours, y: s.level, login: s.login }));

    if (allPts.length === 0) return;

    // 平均線の計算は偏差値母集団（アクティブ学生 or 全学生）から行う
    // → stats.html の散布図の平均線と一致させる
    const xs = pts.map(p => p.x);
    const ys = pts.map(p => p.y);
    const xMean = xs.length ? xs.reduce((a,b)=>a+b,0) / xs.length : 0;
    const yMean = ys.length ? ys.reduce((a,b)=>a+b,0) / ys.length : 0;
    const xMax = Math.max(...allPts.map(p => p.x));
    const yMax = Math.max(...allPts.map(p => p.y));

    const canvas = document.getElementById('miniScatterCanvas');
    if (!canvas) return;
    if (miniChartInstance) { miniChartInstance.destroy(); miniChartInstance = null; }

    miniChartInstance = new Chart(canvas.getContext('2d'), {
      type: 'scatter',
      data: {
        datasets: [
          {
            label: '学生',
            data: allPts,
            backgroundColor: allPts.map(p => p.login === login ? 'rgba(255,118,117,1)' : 'rgba(108,92,231,0.45)'),
            pointRadius: allPts.map(p => p.login === login ? 9 : 4),
            pointHoverRadius: allPts.map(p => p.login === login ? 11 : 6),
            pointBorderColor: allPts.map(p => p.login === login ? 'rgba(255,255,255,0.9)' : 'transparent'),
            pointBorderWidth: allPts.map(p => p.login === login ? 2 : 0),
            order: 2,
          },
          {  // 時間平均 縦線（偏差値母集団ベース）
            data: [{x: xMean, y: 0}, {x: xMean, y: yMax * 1.1}],
            type: 'line', borderColor: 'rgba(253,203,110,0.65)', borderWidth: 1.5,
            borderDash: [4,3], pointRadius: 0, fill: false, order: 1,
          },
          {  // Level平均 横線（偏差値母集団ベース）
            data: [{x: 0, y: yMean}, {x: xMax * 1.1, y: yMean}],
            type: 'line', borderColor: 'rgba(0,206,201,0.65)', borderWidth: 1.5,
            borderDash: [4,3], pointRadius: 0, fill: false, order: 1,
          },
        ],
      },
      options: {
        animation: { duration: 400 },
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            filter(item) { return item.datasetIndex === 0; },
            callbacks: {
              label(ctx) {
                return ` ${ctx.raw.login}: ${Number(ctx.raw.x).toFixed(1)}h / Lv${Number(ctx.raw.y).toFixed(2)}`;
              },
            },
            backgroundColor: '#1a1a24', borderColor: '#2a2a3a', borderWidth: 1,
            bodyColor: '#e8e8f0', padding: 8,
          },
        },
        scales: {
          x: {
            title: { display: true, text: 'ログイン時間 (h)', color: '#8888a0', font: { size: 10 } },
            grid: { color: '#2a2a3a' }, ticks: { color: '#8888a0', font: { size: 9 } }, min: 0,
          },
          y: {
            title: { display: true, text: 'Level', color: '#8888a0', font: { size: 10 } },
            grid: { color: '#2a2a3a' }, ticks: { color: '#8888a0', font: { size: 9 } }, min: 0,
          },
        },
      },
    });

    // 合格ライン参考（管理者かつ結果発表済みのみ）
    if (currentStudentData && isAdmin && d.results_announced) {
      const passed = all.filter(s => s.piscine_result === 'passed');
      renderThresholds(currentStudentData, passed, all.length);
    }
  } catch(e) {
    console.warn('mini chart error:', e);
  }
}

function renderThresholds(student, passed, totalCount) {
  const section = document.getElementById('thresholds-section');
  if (!section || passed.length === 0) return;

  function getStats(students, fn) {
    const vals = students.map(fn).filter(v => v != null && v > 0).sort((a, b) => a - b);
    if (vals.length === 0) return null;
    return {
      min: vals[0],
      median: vals[Math.floor(vals.length / 2)],
      max: vals[vals.length - 1],
    };
  }

  const metrics = [
    { label: 'Final Exam', unit: 'pt', decimals: 0,
      fn: s => s.exam_score, val: student.exam_score },
    { label: 'ログイン時間', unit: 'h', decimals: 1,
      fn: s => s.total_hours ?? s.total_logged_hours, val: student.total_logged_hours },
    { label: 'Level', unit: '', decimals: 2,
      fn: s => s.level, val: student.level },
    { label: 'レビュー回数', unit: '回', decimals: 0,
      fn: s => s.review_given, val: student.review_given },
  ];

  const fmt = (v, m) => v != null ? v.toFixed(m.decimals) + m.unit : '-';

  const rows = metrics.map(m => {
    const st = getStats(passed, m.fn);
    if (!st) return '';
    const sv = m.val;
    const aboveMin = sv != null && sv >= st.min;
    const aboveMed = sv != null && sv >= st.median;
    const color = sv == null ? 'var(--text-dim)' : aboveMed ? 'var(--green)' : aboveMin ? 'var(--orange)' : 'var(--red)';
    const icon = sv == null ? '?' : aboveMed ? '◎' : aboveMin ? '○' : '△';
    const maxBar = Math.max(st.max * 1.1, sv ?? 0, 0.1);
    const minPct = Math.min(98, st.min / maxBar * 100).toFixed(1);
    const medPct = Math.min(98, st.median / maxBar * 100).toFixed(1);
    const valPct = sv != null ? Math.min(98, sv / maxBar * 100).toFixed(1) : null;

    return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
        <div style="font-size:12px;color:var(--text)">${m.label}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="font-size:13px;font-weight:700;color:${color}">${fmt(sv, m)}</div>
          <div style="font-size:15px;color:${color}">${icon}</div>
        </div>
      </div>
      <div style="position:relative;height:8px;background:var(--surface2);border-radius:4px">
        <div style="position:absolute;left:${minPct}%;width:${Math.max(0, medPct - minPct)}%;height:100%;background:rgba(0,206,201,0.18);border-radius:2px"></div>
        <div style="position:absolute;left:${minPct}%;top:-3px;width:2px;height:14px;background:var(--orange);opacity:0.9;border-radius:1px"></div>
        <div style="position:absolute;left:${medPct}%;top:-3px;width:2px;height:14px;background:var(--green);opacity:0.7;border-radius:1px"></div>
        ${valPct !== null ? `<div style="position:absolute;left:${valPct}%;top:-4px;width:3px;height:16px;background:#ff7675;border-radius:2px;transform:translateX(-50%)"></div>` : ''}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <div style="font-size:9px;color:var(--text-dim)"><span style="color:var(--orange)">|</span> 最低 ${fmt(st.min, m)}</div>
        <div style="font-size:9px;color:var(--text-dim)"><span style="color:var(--green)">|</span> 中央値 ${fmt(st.median, m)}</div>
      </div>
    </div>`;
  }).filter(Boolean).join('');

  if (!rows) return;

  const passRate = ((passed.length / totalCount) * 100).toFixed(0);
  section.innerHTML = `
    <div class="card fade-in" style="margin-bottom:12px">
      <div class="card-title">合格ライン参考（合格者 ${passed.length}人 / 全体 ${totalCount}人・合格率 ${passRate}%）</div>
      ${rows}
      <div style="margin-top:12px;font-size:10px;color:var(--text-dim);line-height:1.6">
        <span style="color:#ff7675">|</span> あなた &nbsp;
        <span style="color:var(--orange)">|</span> 合格最低値 &nbsp;
        <span style="color:var(--green)">|</span> 合格中央値<br>
        ◎ 中央値以上 &nbsp; ○ 最低値以上 &nbsp; △ 最低値未満（参考値のため合否を保証しません）
      </div>
    </div>`;
}

function showError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-label">Piscine Commitment Tracker</div>
      <h1>${LOGIN}</h1>
    </div>
    <div class="error-card">
      <h3>Error</h3>
      <p>${msg}</p>
      <p style="margin-top:12px;font-size:11px">Data is updated every 5 minutes via GitHub Actions</p>
    </div>
  `;
}

let loggedInUser = null;

requireAuth().then(user => {
  if (!user) return;
  loggedInUser = user;
  loadData();
  setInterval(loadData, 5 * 60 * 1000);
});
</script>
